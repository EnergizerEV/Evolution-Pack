<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --main-accent: var(--aqua);
        }

        * { cursor: none !important; }

        body {
            background-color: var(--bg-color); color: #e0e6ed;
            font-family: 'Orbitron', sans-serif; margin: 0;
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; overflow-x: hidden; min-height: 100vh;
            transition: filter 0.1s ease; /* Для эффекта помех */
        }

        /* ЭФФЕКТ ГЛИТЧА ПРИ КЛИКЕ */
        body.glitch-active {
            filter: hue-rotate(90deg) contrast(1.5);
            transform: translateX(2px) skewX(1deg);
        }

        /* ФОНОВАЯ СЕТКА */
        #grid-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; pointer-events: none;
        }

        /* КАСТОМНЫЙ КУРСОР */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 99999; will-change: transform;
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        /* ВИДЖЕТ СТАТУСА */
        #sys-status {
            position: fixed; bottom: 20px; left: 20px;
            font-family: 'Source Code Pro', monospace; font-size: 10px;
            color: var(--main-accent); z-index: 100; text-transform: uppercase;
            background: rgba(0,0,0,0.5); padding: 10px; border-left: 2px solid var(--main-accent);
        }

        /* СКРЫТАЯ КОНСОЛЬ */
        #terminal-console {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(0, 10, 10, 0.95);
            border: 1px solid var(--main-accent); padding: 15px;
            z-index: 10000; font-family: 'Source Code Pro', monospace;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 255, 216, 0.2);
        }
        #terminal-console.active { top: 20px; }
        #terminal-input {
            background: transparent; border: none; color: #fff; width: 80%;
            outline: none; font-family: inherit; font-size: 14px;
        }

        /* Остальные стили из твоего Идеального кода... */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--main-accent); font-family: 'Source Code Pro', monospace; transition: opacity 1s; }
        .loading-text { font-size: 14px; margin-bottom: 15px; letter-spacing: 2px; }
        .progress-bar-container { width: 200px; height: 2px; background: rgba(0, 255, 216, 0.1); border: 1px solid rgba(0, 255, 216, 0.3); position: relative; overflow: hidden; }
        .progress-bar-fill { position: absolute; height: 100%; width: 0%; background: var(--main-accent); box-shadow: 0 0 15px var(--main-accent); animation: loadProgress 4s forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        #main-content { opacity: 0; transition: opacity 2s ease; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 1000; }
        .crt-scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.4; }

        .parallax-layer { transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); will-change: transform; }
        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 20px; z-index: 10; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 10px var(--main-accent)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; }
        @keyframes glitch-step { 0%, 90%, 100% { opacity: 0; transform: none; } 92% { opacity: 1; transform: translate(6px, -3px); } 94% { opacity: 1; transform: translate(-6px, 3px); } }

        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; z-index: 10; }
        .header h1 span { color: var(--main-accent); }

        .card { background: rgba(10, 15, 20, 0.9); border: 1px solid #1a262b; padding: 40px; width: 100%; max-width: 600px; margin-bottom: 30px; position: relative; z-index: 20; }
        .card h2 { color: #fff; font-weight: normal; }
        .aqua-style:hover { border-left: 4px solid var(--aqua); box-shadow: 0 0 40px rgba(0, 255, 216, 0.2); }
        .night-style:hover { border-left: 4px solid var(--blood-red); box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); }
        
        .btn { display: inline-block; padding: 12px 25px; text-decoration: none; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; border: 1px solid #1a262b; color: #555; position: relative; z-index: 30; transition: 0.3s; }
        .btn:hover { background: #fff !important; color: #000 !important; }

        .footer { margin-top: auto; padding-top: 40px; font-size: 0.65rem; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="sys-status">
        CPU: <span id="cpu-load">00</span>% <br>
        NET: STABLE <br>
        LOC: 127.0.0.1
    </div>

    <div id="terminal-console">
        <span style="color:var(--main-accent)">EVO_OS ></span>
        <input type="text" id="terminal-input" placeholder="Введите команду..." autocomplete="off">
    </div>

    <div id="loading-screen">
        <div class="loading-text" id="status-text">SYSTEM STANDBY...</div>
        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="vignette"></div>
        <div class="crt-scanlines"></div>
        
        <div class="logo-wrapper parallax-layer" data-strength="60">
            <div class="glitch-logo logo-base"></div>
            <div class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="90">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="150">
            <h2><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
            <p>Классический набор текстур включающий в себя: Dark-Aqua, Equipments&Skins, SFX-Pack</p>
            <a href="#" class="btn glitch-btn">Download</a>
        </div>

        <div class="footer">
            UNAUTHORIZED ACCESS // <span id="nickname" style="color:#444">M45T0D0NM4N</span> // V.5.0
        </div>
    </div>

    <script>
        // 1. ИНТЕРАКТИВНАЯ СЕТКА (CANVAS)
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x: -1000, y: -1000 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = 50;
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--main-accent');
            ctx.lineWidth = 0.5;

            for (let x = 0; x < canvas.width; x += size) {
                for (let y = 0; y < canvas.height; y += size) {
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    const offset = Math.max(0, 15 - dist / 20); // Эффект прогиба
                    
                    ctx.beginPath();
                    ctx.globalAlpha = offset > 0 ? 0.8 : 0.2;
                    ctx.rect(x - offset/2, y - offset/2, size + offset, size + offset);
                    ctx.stroke();
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        // 2. КОНСОЛЬ КОМАНД
        const consoleEl = document.getElementById('terminal-console');
        const terminalInput = document.getElementById('terminal-input');

        window.addEventListener('keydown', (e) => {
            if (e.key === '`' || e.key === 'F2') {
                e.preventDefault();
                consoleEl.classList.toggle('active');
                if (consoleEl.classList.contains('active')) terminalInput.focus();
            }
        });

        terminalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = terminalInput.value.toLowerCase();
                if (cmd === 'red') {
                    document.documentElement.style.setProperty('--main-accent', 'var(--blood-red)');
                } else if (cmd === 'aqua') {
                    document.documentElement.style.setProperty('--main-accent', 'var(--aqua)');
                } else if (cmd === 'clear') {
                    consoleEl.classList.remove('active');
                }
                terminalInput.value = '';
            }
        });

        // 3. ЭФФЕКТ ПОМЕХ ПРИ КЛИКЕ
        document.addEventListener('mousedown', () => {
            document.getElementById('custom-cursor').classList.add('pressed');
            document.body.classList.add('glitch-active');
            setTimeout(() => document.body.classList.remove('glitch-active'), 80);
        });
        document.addEventListener('mouseup', () => {
            document.getElementById('custom-cursor').classList.remove('pressed');
        });

        // 4. ДВИЖЕНИЕ КУРСОРA И ПАРАЛЛАКСА
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            const cursor = document.getElementById('custom-cursor');
            requestAnimationFrame(() => {
                cursor.style.left = `${e.clientX}px`;
                cursor.style.top = `${e.clientY}px`;
            });

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const strength = layer.getAttribute('data-strength');
                layer.style.transform = `translate3d(${(e.clientX - centerX) / strength}px, ${(e.clientY - centerY) / strength}px, 0)`;
            });
        });

        // СТАТУС ВИДЖЕТ (CPU Load)
        setInterval(() => {
            document.getElementById('cpu-load').innerText = Math.floor(Math.random() * 20) + 10;
        }, 2000);

        // ЗАГРУЗКА (как в идеальном коде)
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                document.getElementById('loading-screen').style.visibility = 'hidden';
                document.getElementById('main-content').style.opacity = '1';
            }, 3500);
        });
    </script>
</body>
</html>
