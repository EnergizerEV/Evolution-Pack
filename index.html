<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
        }

        .scanline {
            width: 100%;
            height: 150px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 216, 0) 0%, rgba(0, 255, 216, 0.03) 50%, rgba(0, 255, 216, 0) 100%);
            position: fixed;
            bottom: 100%;
            left: 0;
            pointer-events: none;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -150px; }
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 999;
            background-size: 100% 3px;
            pointer-events: none;
        }

        /* Логотип с мягким глюком */
        .logo-container {
            width: 130px;
            height: 130px;
            margin-bottom: 20px;
            background-image: url('EV_Dark_2k.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 2px solid var(--aqua);
            box-shadow: 0 0 15px var(--aqua);
            animation: glitch-soft 6s infinite;
        }

        @keyframes glitch-soft {
            0%, 92%, 96%, 100% { background-image: url('EV_Dark_2k.png'); transform: none; filter: none; }
            94% { background-image: url('EV_Dark_2k_ERR.png'); transform: translateX(2px) skewX(2deg); filter: brightness(1.2); }
            95% { background-image: url('EV_Dark_2k_ERR.png'); transform: translateX(-2px); filter: contrast(1.1); }
        }

        /* Шапка сайта */
        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 10px 0;
        }
        .header h1 span { color: var(--aqua); }
        .header h1 i { color: #fff; font-style: normal; }

        .card {
            background: rgba(10, 15, 20, 0.95);
            border: 1px solid #1a262b;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* EVolution Pack Стиль */
        .aqua-style { border-left: 4px solid #222; }
        .aqua-style h2 { color: #fff; transition: 0.3s; }
        .aqua-style h2 span { color: #fff; transition: 0.5s; } /* Изначально белые */

        .aqua-style:hover { 
            border-color: var(--aqua); 
            box-shadow: 0 0 30px rgba(0, 255, 216, 0.1); 
            transform: scale(1.03); 
        }
        .aqua-style:hover h2 { 
            text-shadow: 0 0 10px var(--aqua), 0 0 20px rgba(0, 255, 216, 0.5); 
        }
        /* Загораются буквы при наведении на карточку */
        .aqua-style:hover h2 span { color: var(--aqua); }

        /* Project Night Стиль */
        .night-style { border-left: 4px solid #222; }
        .night-title i { color: #fff; font-style: normal; transition: 0.3s; }
        .night-title b { color: var(--blood-red); font-weight: 700; transition: 0.3s; opacity: 0.8; }

        .night-style:hover { 
            border-left: 4px solid var(--blood-red);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1); 
            transform: scale(1.03);
            background: rgba(20, 10, 10, 0.9);
        }
        .night-style:hover .night-title { 
            text-shadow: 0 0 10px var(--blood-red), 0 0 20px rgba(255, 0, 0, 0.5); 
            transform: skewX(-10deg);
        }
        .night-style:hover .night-title b { opacity: 1; }

        p { font-size: 0.85rem; color: #8da0a9; letter-spacing: 1px; }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid;
            transition: 0.3s;
        }
        .btn-aqua { color: #444; border-color: #222; }
        .aqua-style:hover .btn-aqua { color: var(--aqua); border-color: var(--aqua); }
        .btn-aqua:hover { background: var(--aqua) !important; color: #000 !important; }

        .btn-night { color: #444; border-color: #222; }
        .night-style:hover .btn-night { color: var(--blood-red); border-color: var(--blood-red); }
        .btn-night:hover { background: var(--blood-red) !important; color: #fff !important; }

        /* Футер */
        .footer {
            margin-top: 50px;
            font-size: 0.65rem;
            color: #222;
            letter-spacing: 2px;
            text-align: center;
        }

            display: inline-block;
            color: #333
