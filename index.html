<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergizerEV | SAS4 Packs</title>
    <style>
        /* Минималистичный темный стиль */
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            padding: 60px 20px;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: -1px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .pack {
            background: #111;
            border: 1px solid #222;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .pack:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .pack h2 {
            margin-top: 0;
            color: #fff;
        }
        .btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
        .btn:hover { background: #ccc; }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #444;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SAS4 Texture Hub</h1>

        <div class="pack">
            <h2>Evolution Pack</h2>
            <p>Глобальное улучшение четкости текстур, переработка окружения и спецэффектов.</p>
            <a href="#" class="btn">Скачать Pack</a>
        </div>

        <div class="pack">
            <h2>Project Night</h2>
            <p>Мрачный визуальный стиль, изменяющий атмосферу игры на более темную и серьезную.</p>
            <a href="#" class="btn">Скачать Pack</a>
        </div>

        <div class="footer">
            © 2026 EnergizerEV. Сделано для фанатов SAS4.
        </div>
    </div>
</body>
</html>
