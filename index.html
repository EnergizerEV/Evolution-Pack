<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution | Terminal Stable Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
        }

        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
        }

        * { cursor: none !important; -webkit-tap-highlight-color: transparent; }

        /* ВИНЬЕТКА И ЭФФЕКТЫ */
        .vignette { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%); 
            pointer-events: none; z-index: 1000; 
        }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none; z-index: 999; opacity: 0.3;
        }

        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.05), transparent);
            opacity: 0.1; pointer-events: none; z-index: 1001;
            animation: scanning 4s linear infinite;
        }
        @keyframes scanning { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }

        /* КУРСОР */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 999999; will-change: transform;
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        #grid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none; }

        /* КОНСОЛЬ */
        #term-console {
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(5, 10, 10, 0.98);
            border: 1px solid var(--current-accent); padding: 20px;
            z-index: 100000; font-family: 'Source Code Pro', monospace;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #term-console.active { top: 30px; }
        #term-input { background: transparent; border: none; color: #fff; width: 80%; outline: none; caret-color: var(--current-accent); font-family: inherit; }

        /* КОНТЕНТ */
        #main-content { 
            opacity: 0; transition: opacity 2s ease; 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; height: 100vh; overflow-y: scroll; scrollbar-width: none; 
            padding: 60px 0; perspective: 1500px;
        }
        #main-content::-webkit-scrollbar { display: none; }

        /* ЛОГОТИП (СТАТИЧНЫЙ) */
        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 10px; z-index: 10; pointer-events: none; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 15px var(--current-accent)); transition: background-image 0.4s; }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; transition: background-image 0.4s; }
        @keyframes glitch-step { 0%, 90% { opacity: 0; } 92% { opacity: 1; transform: translate(5px, -3px); } 94% { opacity: 1; transform: translate(-5px, 3px); } }

        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 30px; text-align: center; pointer-events: none; }
        .header h1 span { color: var(--current-accent); transition: color 0.4s; }

        /* КАРТОЧКИ (ПЛАВНЫЙ СКЕЙЛ + МЯГКИЙ ПОВОРОТ) */
        .card {
            background: rgba(10, 15, 20, 0.92); border: 1px solid #1a262b; 
            padding: 40px; width: 85%; max-width: 600px; margin-bottom: 30px; 
            position: relative; z-index: 20;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), border 0.4s, box-shadow 0.4s, background 0.4s;
            backdrop-filter: blur(2px);
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 240px; transform-style: preserve-3d;
        }

        .card h2 { margin: 0; font-weight: normal; font-size: 1.4rem; color: #fff; transition: 0.4s; }
        .glow-part, .night-glow { transition: 0.4s; }

        .aqua-style:hover { 
            border-left: 5px solid var(--current-accent); 
            box-shadow: 0 0 50px rgba(0, 255, 216, 0.15); 
            background: rgba(10, 25, 25, 0.95); 
        }
        .aqua-style:hover .glow-part { color: var(--current-accent); text-shadow: 0 0 20px var(--current-accent); font-weight: bold; }

        .night-style:hover { 
            border-left: 5px solid var(--blood-red); 
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); 
            background: rgba(25, 10, 10, 0.95); 
        }
        .night-style:hover .night-glow { color: var(--blood-red); text-shadow: 0 0 20px var(--blood-red); font-weight: bold; }

        .type-output { font-size: 0.85rem; color: #8da0a9; line-height: 1.6; min-height: 4em; margin-top: 15px; font-family: 'Source Code Pro', monospace; }

        /* КНОПКИ (МЕРЦАНИЕ) */
        .btn {
            display: inline-block; padding: 12px 28px; text-decoration: none; font-weight: bold; font-size: 0.75rem; 
            text-transform: uppercase; border: 1px solid #1a262b; transition: 0.3s; color: #555; position: relative;
        }
        .card:hover .btn { border-color: inherit; color: inherit; }
        .btn:hover { 
            background: #fff !important; color: #000 !important; 
            animation: btn-flicker 1.5s ease-in-out infinite; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }
        @keyframes btn-flicker { 0%, 100% { opacity: 1; } 15% { opacity: 0.4; } 30% { opacity: 1; } 45% { opacity: 0.7; } 60% { opacity: 1; } }

        /* СТАТУС И ФУТЕР */
        #sys-status { position: fixed; bottom: 25px; left: 25px; font-family: 'Source Code Pro'; font-size: 10px; color: var(--current-accent); opacity: 0.5; z-index: 1001; }
        .footer { padding: 40px 0; font-size: 0.65rem; color: #333; text-align: center; letter-spacing: 2px; }
        .scramble-text { cursor: pointer; display: inline-block; transition: 0.3s; }
        .scramble-text:hover { color: var(--current-accent); }

        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--aqua); font-family: 'Source Code Pro', monospace; }
        .progress-bar-container { width: 250px; height: 2px; background: rgba(0, 255, 216, 0.1); border: 1px solid rgba(0, 255, 216, 0.3); position: relative; margin-top: 15px; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--aqua); box-shadow: 0 0 15px var(--aqua); animation: loadProgress 3.5s forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            .card { width: 85%; padding: 30px; min-height: auto; }
            .header h1 { font-size: 1.6rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body class="aqua-mode">

    <div class="vignette"></div>
    <div class="crt-overlay"></div>
    <div class="scan-line"></div>
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <span style="color:var(--current-accent)">EVO_OS ></span>
        <input type="text" id="term-input" placeholder="Type command..." autocomplete="off">
    </div>

    <div id="sys-status">
        CPU_LOAD: <span id="cpu-val">00</span>% <br>
        SYSTEM: STABLE <br>
        MODE: <span id="mode-text">AQUA_CORE</span>
    </div>

    <div id="loading-screen">
        <div class="loading-text">INITIALIZING EVO_OS...</div>
        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="logo-wrapper">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="150">
            <div>
                <h2><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
                <p class="type-output" data-text="Классический набор текстур включающий в себя: Dark-Aqua, Equipments&Skins, SFX-Pack."></p>
            </div>
            <div style="display:flex; gap:12px; flex-wrap: wrap;">
                <a href="#" class="btn">PC</a>
                <a href="#" class="btn">Android</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-strength="150">
            <div>
                <h2>PROJECT <span class="night-glow">NIGHT</span></h2>
                <p class="type-output" data-text="Набор Текстур, добавляющий механику 'Тьмы'. На грани возможного."></p>
            </div>
            <a href="#" class="btn">Access Files</a>
        </div>

        <div class="footer">
            UNAUTHORIZED ACCESS // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // V.5.5
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const logoMain = document.getElementById('logo-main');
        const logoErr = document.getElementById('logo-err');
        let mouse = { x: -1000, y: -1000 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--current-accent').trim();
            ctx.lineWidth = 0.5;
            for (let x = 0; x < canvas.width; x += 50) {
                for (let y = 0; y < canvas.height; y += 50) {
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    const offset = Math.max(0, 10 - dist / 30);
                    ctx.globalAlpha = offset > 0 ? 0.6 : 0.15;
                    ctx.strokeRect(x - offset/2, y - offset/2, 50 + offset, 50 + offset);
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        const update = (e) => {
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            mouse.x = x; mouse.y = y;
            if(cursor) cursor.style.transform = `translate3d(${x}px, ${y}px, 0)`;

            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const str = layer.getAttribute('data-strength');
                const mx = (x - cx) / str;
                const my = (y - cy) / str;
                const isHovered = layer.matches(':hover');
                
                // ЗНАЧИТЕЛЬНО УМЕНЬШЕННЫЙ ПОВОРОТ (коэффициент 40)
                const rx = isHovered ? (cy - y) / 40 : 0;
                const ry = isHovered ? (x - cx) / 40 : 0;
                
                layer.style.transform = `translate3d(${mx}px, ${my}px, 0) rotateX(${rx}deg) rotateY(${ry}deg) scale(${isHovered ? 1.03 : 1})`;
            });
        };

        window.addEventListener('mousemove', update);
        window.addEventListener('touchmove', (e) => update(e.touches[0]));

        document.addEventListener('mousedown', (e) => {
            cursor?.classList.add('pressed');
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
        document.addEventListener('mouseup', () => cursor?.classList.remove('pressed'));

        // КОНСОЛЬ + ФИКС ЛОГОТИПА
        const inputEl = document.getElementById('term-input');
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backquote') {
                e.preventDefault();
                document.getElementById('term-console').classList.toggle('active');
                if (document.getElementById('term-console').classList.contains('active')) inputEl.focus();
            }
        });

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.toLowerCase().trim();
                if (cmd === 'red') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--blood-red)');
                    document.getElementById('mode-text').innerText = "NIGHT_PROTOCOL";
                    // Смена логотипов
                    logoMain.style.backgroundImage = "url('Project_Night_Icon.png')";
                    logoErr.style.backgroundImage = "url('Project_Night_Icon_ERR.png')";
                } else if (cmd === 'aqua') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--aqua)');
                    document.getElementById('mode-text').innerText = "AQUA_CORE";
                    // Возврат логотипов
                    logoMain.style.backgroundImage = "url('EV_Dark_2k.png')";
                    logoErr.style.backgroundImage = "url('EV_Dark_2k_ERR.png')";
                }
                inputEl.value = '';
            }
        });

        // ПРИНТЕР
        function startTyping() {
            document.querySelectorAll('.type-output').forEach(el => {
                const text = el.getAttribute('data-text');
                let i = 0; el.innerText = '';
                const t = setInterval(() => {
                    el.innerText += text[i++];
                    if (i >= text.length) clearInterval(t);
                }, 30);
            });
        }

        // ШИФР
        const nick = document.getElementById('nickname');
        const original = nick.innerText;
        nick.onmouseover = () => {
            let i = 0;
            const interval = setInterval(() => {
                nick.innerText = original.split("").map((l, idx) => idx < i ? original[idx] : "!@#$%^&*()"[Math.floor(Math.random()*10)]).join("");
                if (i >= original.length) clearInterval(interval);
                i += 1/3;
            }, 30);
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    startTyping();
                }, 1000);
                document.getElementById('main-content').style.opacity = '1';
            }, 3500);
            setInterval(() => { document.getElementById('cpu-val').innerText = Math.floor(Math.random()*15)+5; }, 2000);
        });
    </script>
</body>
</html>
