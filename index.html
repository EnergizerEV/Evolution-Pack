<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            /* Мягкое мерцание всей страницы */
            animation: terminal-flicker 0.15s infinite;
        }

        @keyframes terminal-flicker {
            0% { opacity: 0.99; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        /* Анимированный шум (Пыль) */
        .dust {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.06;
            pointer-events: none;
            z-index: 5000;
            animation: dust-move 0.2s steps(3) infinite;
        }

        @keyframes dust-move {
            0% { transform: translate(0,0); }
            20% { transform: translate(1%, -1%); }
            40% { transform: translate(-1%, 2%); }
            60% { transform: translate(1%, 1%); }
            80% { transform: translate(-1%, -2%); }
            100% { transform: translate(0,0); }
        }

        /* Виньетка */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 1000;
        }

        /* CRT линии */
        .crt-lines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.6;
        }

        /* Бегущая линия */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 1010;
            background: linear-gradient(0deg, rgba(0, 255, 216, 0) 0%, rgba(0, 255, 216, 0.05) 50%, rgba(0, 255, 216, 0) 100%);
            position: fixed;
            top: -100px;
            left: 0;
            pointer-events: none;
            animation: scanline-run 8s linear infinite;
        }

        @keyframes scanline-run {
            0% { top: -100px; }
            100% { top: 100%; }
        }

        .logo-container {
            width: 130px; height: 130px;
            margin-bottom: 20px;
            background-image: url('EV_Dark_2k.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 2px solid var(--aqua);
            box-shadow: 0 0 20px var(--aqua);
            animation: glitch-soft 6s infinite;
            position: relative;
            z-index: 20;
        }

        @keyframes glitch-soft {
            0%, 92%, 96%, 100% { background-image: url('EV_Dark_2k.png'); transform: none; }
            94% { background-image: url('EV_Dark_2k_ERR.png'); transform: translateX(3px); }
            95% { background-image: url('EV_Dark_2k_ERR.png'); transform: translateX(-3px); }
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 10px 0;
            z-index: 20;
            position: relative;
        }
        .header h1 span { color: var(--aqua); text-shadow: 0 0 10px var(--aqua); }
        .header h1 i { color: #fff; font-style: normal; }

        .card {
            background: rgba(8, 12, 15, 0.9);
            border: 1px solid #1a262b;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            transition: 0.4s;
            position: relative;
            z-index: 20;
            overflow: hidden;
        }

        /* EVO Card */
        .aqua-style { border-left: 4px solid #1a262b; }
        .aqua-style h2 { transition: 0.4s; margin-top: 0; color: #fff; }
        .aqua-style h2 .glow-part { color: #fff; transition: 0.5s; font-weight: normal; }

        .aqua-style:hover { 
            border-left: 4px solid var(--aqua);
            box-shadow: 0 0 30px rgba(0, 255, 216, 0.15), inset 0 0 25px rgba(0, 255, 216, 0.07); 
            transform: scale(1.02); 
        }
