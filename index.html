<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Вотермарк на фоне */
        .background-watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background-image: url('Watermark_EV.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.03; /* Еле заметный */
            pointer-events: none;
            z-index: -1;
        }

        /* Эффекты терминала */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 1000;
        }

        .crt-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.4;
        }

        .scanline {
            width: 100%; height: 100px;
            z-index: 1010;
            background: linear-gradient(0deg, rgba(0, 255, 216, 0) 0%, rgba(0, 255, 216, 0.03) 50%, rgba(0, 255, 216, 0) 100%);
            position: fixed;
            top: -100px; left: 0;
            pointer-events: none;
            animation: scanline-run 10s linear infinite;
        }

        @keyframes scanline-run { 0% { top: -100px; } 100% { top: 100%; } }

        /* ИСПРАВЛЕННЫЙ ЛОГОТИП С ТВОИМИ НАЗВАНИЯМИ */
        .logo-wrapper {
            position: relative;
            width: 150px; height: 150px;
            margin-bottom: 20px;
            z-index: 10;
        }

        .glitch-logo {
            position: absolute;
            width: 100%; height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .logo-base {
            background-image: url('EV_Dark_2k.png');
            filter: drop-shadow(0 0 10px var(--aqua));
        }

        .logo-glitch {
            background-image: url('EV_Dark_2k_ERR.png');
            opacity: 0;
            animation: glitch-step 4s infinite step-end;
        }

        @keyframes glitch-step {
            0%, 90%, 100% { opacity: 0; transform: none; }
            92% { opacity: 1; transform: translate(5px, -2px); filter: hue-rotate(90deg); }
            94% { opacity: 1; transform: translate(-5px, 2px); filter: saturate(3); }
            95% { opacity: 0.5; transform: scale(1.1); }
        }

        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; z-index: 10; }
        .header h1 span { color: var(--aqua); }

        /* КАРТОЧКИ (БЕЗ ИЗМЕНЕНИЙ) */
        .card {
            background: rgba(10, 15, 20, 0.9);
            border: 1px solid #1a262b;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            z-index: 20;
        }
