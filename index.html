<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #800000;
            --bg-color: #06080a; /* ТВОЙ ОСНОВНОЙ ФОН */
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--aqua);
            font-family: 'Source Code Pro', monospace;
            overflow: hidden;
        }

        #hacker-skull {
            position: absolute;
            width: 250px;
            opacity: 0;
            z-index: 10000;
            image-rendering: pixelated;
        }

        .skull-hacked {
            opacity: 1 !important;
            animation: stepGrow 1.5s steps(5) forwards, glitchTwitch 0.1s infinite alternate;
        }

        @keyframes stepGrow { 0% { transform: scale(0.2); } 100% { transform: scale(1.8); } }
        @keyframes glitchTwitch {
            0% { transform: scale(1.8) translate(0, 0); }
            33% { transform: scale(1.85) translate(-15px, 10px) skew(10deg); filter: invert(0.2) sepia(1) saturate(5); }
            100% { transform: scale(1.9) translate(5px, 5px); }
        }

        .glitch-blocks {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background-image: linear-gradient(rgba(128, 0, 0, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(128, 0, 0, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 9998;
        }

        .tv-static {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/b/b1/Static_noise.png');
            opacity: 0.05; pointer-events: none; z-index: 10001; display: none;
        }

        .bg-hacked { animation: flashBlack 0.05s infinite step-end; }
        @keyframes flashBlack { 0% { background-color: #400000; } 50% { background-color: #000; } }

        /* --- ТВОЙ ОСНОВНОЙ ИНТЕРФЕЙС (БЕЗ ИЗМЕНЕНИЙ) --- */
        #main-content { 
            opacity: 0; 
            transition: opacity 0.8s ease; 
            display: flex; flex-direction: column; align-items: center; width: 100%; 
        }

        body {
            background-color: var(--bg-color); /* Тот самый фон */
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; overflow-x: hidden; min-height: 100vh; position: relative;
        }

        /* Эффекты виньетки и сканирования (как были) */
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 1000; }
        .crt-scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.4; }
        
        /* Логотип с твоим глюком */
        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 20px; z-index: 10; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 10px var(--aqua)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; }
        @keyframes glitch-step { 0%, 90%, 100% { opacity: 0; } 92% { opacity: 1; transform: translate(6px, -3px); } 94% { opacity: 1; transform: translate(-6px, 3px); } }

        /* Карточки */
        .card { background: rgba(10, 15, 20, 0.9); border: 1px solid #1a262b; padding: 40px; width: 100%; max-width: 600px; margin-bottom: 30px; transition: 0.5s; position: relative; z-index: 20; }
        .card h2 { margin-top: 0; color: #fff; font-weight: normal; }
        .aqua-style:hover { border-left: 4px solid var(--aqua); box-shadow: 0 0 40px rgba(0, 255, 216, 0.2); }
        .night-style:hover { border-left: 4px solid #ff0000; box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); }
