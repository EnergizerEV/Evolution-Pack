<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
        }

        html, body { overflow: hidden; height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); }
        * { cursor: none !important; }

        /* ЭФФЕКТ ПОМЕХ ПРИ ПЕРЕХОДЕ (GLITCH OVERLAY) */
        #mode-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100000; opacity: 0; pointer-events: none;
        }

        /* ТУМАН И ПОТЕРТОСТИ */
        .fog-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/asfalt-light.png'); opacity: 0.05; pointer-events: none; z-index: 9998; }
        .fog-layer { position: fixed; top: 0; left: 0; width: 200%; height: 200%; background: radial-gradient(circle at center, transparent 20%, rgba(0, 255, 216, 0.03) 50%, rgba(0,0,0,0.2) 80%); filter: blur(80px); animation: fog-move 20s ease-in-out infinite alternate; pointer-events: none; z-index: 9996; }
        @keyframes fog-move { from { transform: translate(-10%, -10%); } to { transform: translate(0%, 0%); } }

        .scan-line { position: fixed; top: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.05), transparent); opacity: 0.1; pointer-events: none; z-index: 1001; animation: scanning 4s linear infinite; }
        @keyframes scanning { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }

        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%); pointer-events: none; z-index: 9997; }

        #custom-cursor { position: fixed; top: 0; left: 0; width: 32px; height: 32px; background-image: url('Cursor1-F1-32x32x32.png'); background-size: contain; background-repeat: no-repeat; pointer-events: none; z-index: 99999; will-change: transform; }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        #grid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none; }

        #term-console { position: fixed; top: -160px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 600px; background: rgba(0, 5, 5, 0.98); border: 1px solid var(--current-accent); padding: 20px; z-index: 10000; font-family: 'Source Code Pro', monospace; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); }
        #term-console.active { top: 30px; }
        #term-input { background: transparent; border: none; color: #fff; width: 80%; outline: none; font-family: inherit; font-size: 16px; caret-color: var(--current-accent); }

        body { color: #e0e6ed; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-content { opacity: 0; transition: opacity 2s ease; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 1000; }
        .crt-scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.3; }

        .parallax-layer { transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); will-change: transform; }

        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 25px; z-index: 10; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: background-image 0.4s ease; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 15px var(--current-accent)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; }
        @keyframes glitch-step { 0%, 90%, 100% { opacity: 0; transform: none; } 92% { opacity: 1; transform: translate(6px, -3px); } 94% { opacity: 1; transform: translate(-6px, 3px); } }

        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; z-index: 10; margin: 10px 0; }
        .header h1 span { color: var(--current-accent); transition: color 0.4s; }

        .card { background: rgba(10, 15, 20, 0.92); border: 1px solid #1a262b; padding: 40px; width: 100%; max-width: 600px; margin-bottom: 30px; position: relative; z-index: 20; transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), border 0.4s, box-shadow 0.4s, background 0.4s; backdrop-filter: blur(4px); }
        .card h2 { margin-top: 0; color: #fff; transition: 0.4s; font-weight: normal; font-size: 1.4rem; }
        .glow-part, .night-glow { transition: 0.4s; color: #fff; }

        .aqua-style:hover { border-left: 5px solid var(--current-accent); box-shadow: 0 0 50px rgba(0, 255, 216, 0.15); transform: scale(1.03); background: rgba(10, 25, 25, 0.95); }
        body.red-mode .aqua-style:hover { box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); }
        .aqua-style:hover .glow-part { color: var(--current-accent); text-shadow: 0 0 20px var(--current-accent); font-weight: bold; }

        .night-style:hover { border-left: 5px solid var(--blood-red); box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); transform: scale(1.03); background: rgba(25, 10, 10, 0.95); }
        .night-style:hover .night-glow { color: var(--blood-red); text-shadow: 0 0 20px var(--blood-red); font-weight: bold; }

        /* СТИЛЬ ДЛЯ ПРИНТЕРА */
        .typewriter { font-size: 0.85rem; color: #8da0a9; line-height: 1.6; min-height: 3.2em; }

        .btn { display: inline-block; padding: 12px 28px; text-decoration: none; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; border: 1px solid #1a262b; transition: 0.3s; margin-top: 10px; color: #555; position: relative; z-index: 30; }
        .btn:hover { background: #fff !important; color: #000 !important; animation: btn-flicker 1.5s ease-in-out; box-shadow: 0 0 25px rgba(255, 255, 255, 0.5); }
        @keyframes btn-flicker { 0% { opacity: 0.2; } 15% { opacity: 1; } 30% { opacity: 0.4; } 45% { opacity: 1; } 60% { opacity: 0.7; } 75% { opacity: 0.9; } 90% { opacity: 0.8; } 100% { opacity: 1; } }

        .footer { margin-top: 20px; font-size: 0.65rem; color: #333; text-align: center; z-index: 10; letter-spacing: 2px; }
        .scramble-text { display: inline-block; font-family: 'Source Code Pro', monospace; color: #444; transition: 0.3s; }

        #sys-status { position: fixed; bottom: 25px; left: 25px; font-family: 'Source Code Pro', monospace; font-size: 10px; color: var(--current-accent); opacity: 0.5; pointer-events: none; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--aqua); font-family: 'Source Code Pro', monospace; transition: opacity 1s; }
        .progress-bar-fill { position: absolute; height: 100%; width: 0%; background: var(--aqua); box-shadow: 0 0 15px var(--aqua); animation: loadProgress 3.5s forwards; }
        @keyframes loadProgress { to { width: 100%; } }
    </style>
</head>
<body class="aqua-mode">

    <div id="mode-glitch"></div>
    <div class="fog-overlay"></div>
    <div class="fog-layer"></div>
    <div class="scan-line"></div>
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <span style="color:var(--current-accent)">EVO_OS ></span>
        <input type="text" id="term-input" placeholder="Type command..." autocomplete="off">
    </div>

    <div id="sys-status">
        CPU_LOAD: <span id="cpu-val">00</span>% <br>
        SYSTEM: STABLE <br>
        MODE: <span id="mode-text">AQUA_CORE</span>
    </div>

    <div id="loading-screen">
        <div class="loading-text">INITIALIZING EVO_OS...</div>
        <div style="width: 250px; height: 2px; background: rgba(0,255,216,0.1); border: 1px solid rgba(0,255,216,0.3); position: relative; overflow: hidden;">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <div id="main-content">
        <div class="vignette"></div>
        <div class="crt-scanlines"></div>
        
        <div class="logo-wrapper parallax-layer" data-strength="60">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="90">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="150">
            <h2><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
            <p class="typewriter" data-text="Классический набор текстур включающий в себя: Dark-Aqua, Equipments&Skins, SFX-Pack"></p>
            <div style="display:flex; gap:12px;">
                <a href="https://drive.google.com/file/d/1Qw3G5LnlaEteiOD51bF1Oy1uh2A63R9O/view" target="_blank" class="btn">PC</a>
                <a href="https://drive.google.com/file/d/19GXDO7E-SCvKzvF9ZIklORNZ1xmfN8dC/view" target="_blank" class="btn">Android</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-strength="150">
            <h2>PROJECT <span class="night-glow">NIGHT</span></h2>
            <p class="typewriter" data-text="Набор Текстур, добавляющий механику 'Тьмы'. На грани возможного."></p>
            <a href="https://drive.google.com/file/d/1nIO79tg17x5P7VQxxa_dwtIzr42Kk9fq/view" target="_blank" class="btn">Access Files</a>
        </div>

        <div class="footer">
            UNAUTHORIZED ACCESS // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // V.5.8
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const glitchLayer = document.getElementById('mode-glitch');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = 50;
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--current-accent').trim();
            ctx.lineWidth = 0.5;
            for (let x = 0; x < canvas.width; x += size) {
                for (let y = 0; y < canvas.height; y += size) {
                    const dist = Math.hypot(x - (window.mouseX||-1000), y - (window.mouseY||-1000));
                    ctx.globalAlpha = Math.max(0, 0.6 - dist/300);
                    ctx.strokeRect(x, y, size, size);
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        document.addEventListener('mousemove', (e) => {
            window.mouseX = e.clientX; window.mouseY = e.clientY;
            cursor.style.left = `${e.clientX}px`; cursor.style.top = `${e.clientY}px`;
            const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2;
            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const str = layer.getAttribute('data-strength');
                layer.style.transform = `translate3d(${(e.clientX - centerX) / str}px, ${(e.clientY - centerY) / str}px, 0)`;
            });
        });

        // ТЕКСТОВЫЙ ПРИНТЕР
        function typeWriter(el) {
            const text = el.getAttribute('data-text');
            let i = 0;
            el.innerHTML = '';
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 30);
                }
            }
            type();
        }

        const inputEl = document.getElementById('term-input');
        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.toLowerCase().trim();
                if (cmd === 'red' || cmd === 'aqua') {
                    // ЭФФЕКТ ПЕРЕХОДА
                    glitchLayer.style.opacity = '0.4';
                    setTimeout(() => glitchLayer.style.opacity = '0', 150);
                    
                    if (cmd === 'red') {
                        document.documentElement.style.setProperty('--current-accent', 'var(--blood-red)');
                        document.body.classList.add('red-mode');
                        document.getElementById('mode-text').innerText = "NIGHT_PROTOCOL";
                    } else {
                        document.documentElement.style.setProperty('--current-accent', 'var(--aqua)');
                        document.body.classList.remove('red-mode');
                        document.getElementById('mode-text').innerText = "AQUA_CORE";
                    }
                }
                inputEl.value = '';
            }
        });

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.querySelectorAll('.typewriter').forEach(typeWriter);
                }, 1000);
                document.getElementById('main-content').style.opacity = '1';
            }, 3000);
        });
    </script>
</body>
</html>
