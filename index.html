<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution | Terminal Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
            --glow: rgba(0, 255, 216, 0.4);
        }

        /* БАЗОВАЯ СТРУКТУРА (ИДЕАЛЬНЫЙ КОД) */
        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
        }

        * { cursor: none !important; -webkit-tap-highlight-color: transparent; }

        /* СКАН-ЛИНИЯ И ЭФФЕКТЫ ТЕРМИНАЛА */
        .scan-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.08), transparent);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1001;
            animation: scanning 6s linear infinite;
        }
        @keyframes scanning {
            0% { transform: translateY(-120px); }
            100% { transform: translateY(100vh); }
        }

        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.5) 100%);
            pointer-events: none; z-index: 9997;
        }

        /* КУРСОР (ИДЕАЛЬНЫЙ КОД) */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 99999; will-change: transform;
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        .click-ripple {
            position: fixed; border: 2px solid var(--current-accent);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 9998; animation: ripple-out 0.6s ease-out forwards;
        }
        @keyframes ripple-out {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 180px; height: 180px; opacity: 0; border-width: 1px; }
        }

        /* ФОНОВАЯ СЕТКА И ДИНАМИКА */
        #grid-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; opacity: 0.2; pointer-events: none; 
            filter: blur(0.5px);
        }

        /* КОНСОЛЬ (ИДЕАЛЬНЫЙ КОД) */
        #term-console {
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 650px; background: rgba(2, 8, 8, 0.95);
            border: 1px solid var(--current-accent); padding: 25px;
            z-index: 10000; font-family: 'Source Code Pro', monospace;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 216, 0.1);
        }
        #term-console.active { top: 40px; }
        #term-input {
            background: transparent; border: none; color: #fff; width: 80%;
            outline: none; font-family: inherit; font-size: 16px; caret-color: var(--current-accent);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-content { 
            opacity: 0; 
            transition: opacity 2.5s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            height: 100vh; 
            overflow-y: scroll; /* Для мобильных */
            scrollbar-width: none; 
            padding: 80px 0;
            perspective: 1000px;
        }
        #main-content::-webkit-scrollbar { display: none; }

        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 1000; }
        .crt-scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 3px; pointer-events: none; z-index: 999; opacity: 0.2; }

        /* ЛОГОТИП И ГЛИТЧ (ИДЕАЛЬНЫЙ КОД) */
        .logo-wrapper { position: relative; width: 160px; height: 160px; margin-bottom: 30px; z-index: 10; flex-shrink: 0; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: 0.4s; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 20px var(--current-accent)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 5s infinite step-end; }
        
        @keyframes glitch-step { 
            0%, 88%, 100% { opacity: 0; transform: none; filter: hue-rotate(0deg); } 
            90% { opacity: 1; transform: translate(8px, -4px); filter: hue-rotate(90deg); } 
            93% { opacity: 1; transform: translate(-8px, 4px); filter: hue-rotate(-90deg); } 
            95% { opacity: 0.5; transform: scale(1.1); }
        }

        .header h1 { 
            font-size: 2.8rem; letter-spacing: 15px; text-transform: uppercase; 
            margin: 15px 0; text-align: center; text-shadow: 0 0 15px var(--glow);
        }
        .header h1 span { color: var(--current-accent); transition: 0.4s; }

        /* КАРТОЧКИ (ИДЕАЛЬНЫЙ КОД + УЛЬТРА СТИЛЬ) */
        .card {
            background: rgba(8, 12, 15, 0.9); 
            border: 1px solid rgba(26, 38, 43, 0.8); 
            padding: 45px; 
            width: 85%; max-width: 650px; 
            margin-bottom: 40px; 
            position: relative; z-index: 20;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card::before {
            content: "ID_" + attr(data-id);
            position: absolute; top: 10px; right: 15px;
            font-family: 'Source Code Pro'; font-size: 8px; color: #333;
        }

        .card h2 { margin-top: 0; color: #fff; transition: 0.4s; font-weight: normal; font-size: 1.6rem; letter-spacing: 2px; }
        .glow-part, .night-glow { transition: 0.4s; color: #fff; }

        /* ХОВЕР ЭФФЕКТЫ (ИДЕАЛЬНЫЙ КОД) */
        .aqua-style:hover { 
            border-left: 6px solid var(--current-accent); 
            box-shadow: 0 0 60px rgba(0, 255, 216, 0.15), inset 0 0 20px rgba(0, 255, 216, 0.05); 
            transform: translateY(-10px) rotateX(2deg);
            background: rgba(10, 28, 30, 0.98);
        }
        .aqua-style:hover .glow-part { color: var(--current-accent); text-shadow: 0 0 25px var(--current-accent); font-weight: bold; }

        .night-style:hover { 
            border-left: 6px solid var(--blood-red); 
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2); 
            transform: translateY(-10px) rotateX(2deg);
            background: rgba(30, 10, 10, 0.98);
        }
        .night-style:hover .night-glow { color: var(--blood-red); text-shadow: 0 0 25px var(--blood-red); font-weight: bold; }

        /* ТИПОГРАФИКА */
        .type-output { font-size: 0.95rem; color: #a1b0b9; line-height: 1.8; min-height: 3em; font-family: 'Source Code Pro', monospace; }

        /* КНОПКИ (ИДЕАЛЬНЫЙ КОД) */
        .btn {
            display: inline-block; padding: 14px 32px; text-decoration: none; font-weight: bold; font-size: 0.8rem; 
            text-transform: uppercase; border: 1px solid #1a262b; transition: all 0.4s; 
            margin-top: 15px; color: #666; position: relative; overflow: hidden;
        }
        .card:hover .btn { border-color: rgba(255,255,255,0.2); color: #888; }
        .aqua-style:hover .btn { border-color: var(--current-accent); color: var(--current-accent); }
        .night-style:hover .btn { border-color: var(--blood-red); color: var(--blood-red); }

        .btn:hover { 
            background: #fff !important; 
            color: #000 !important; 
            box-shadow: 0 0 30px #fff;
            transform: translateY(-2px);
        }

        /* ЗАГРУЗКА (ИДЕАЛЬНЫЙ КОД) */
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 99999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            color: var(--aqua); font-family: 'Source Code Pro', monospace; 
            transition: opacity 1.2s cubic-bezier(0.7, 0, 0.3, 1); 
        }
        .loading-text { letter-spacing: 8px; margin-bottom: 20px; font-size: 14px; text-shadow: 0 0 10px var(--aqua); }
        .progress-bar-container { width: 280px; height: 1px; background: rgba(0, 255, 216, 0.1); position: relative; }
        .progress-bar-fill { position: absolute; height: 100%; width: 0%; background: var(--aqua); box-shadow: 0 0 20px var(--aqua); animation: loadProgress 3.5s cubic-bezier(0.1, 0, 0.2, 1) forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        /* ИНТЕРФЕЙСНЫЕ ДАННЫЕ */
        #sys-status { position: fixed; bottom: 30px; left: 30px; font-family: 'Source Code Pro', monospace; font-size: 11px; color: var(--current-accent); opacity: 0.6; pointer-events: none; z-index: 10001; line-height: 1.5; }
        .coord-display { position: fixed; bottom: 30px; right: 30px; font-family: 'Source Code Pro'; font-size: 10px; color: #333; pointer-events: none; }

        .footer { margin-top: auto; padding: 40px 0; font-size: 0.7rem; color: #222; text-align: center; letter-spacing: 3px; }
        .scramble-text { cursor: pointer; color: #444; transition: 0.3s; }

        /* МОБИЛЬНАЯ ОПТИМИЗАЦИЯ */
        @media (max-width: 768px) {
            * { cursor: auto !important; }
            #custom-cursor { display: none; }
            .header h1 { font-size: 1.8rem; letter-spacing: 8px; }
            .card { padding: 30px 20px; width: 88%; }
            .card h2 { font-size: 1.2rem; }
            #sys-status { bottom: 15px; left: 15px; font-size: 9px; }
            .coord-display { display: none; }
            .logo-wrapper { width: 130px; height: 130px; }
        }
    </style>
</head>
<body class="aqua-mode">

    <div class="scan-line"></div>
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <span style="color:var(--current-accent)">EVO_OS ></span>
        <input type="text" id="term-input" placeholder="Enter command..." autocomplete="off">
    </div>

    <div id="sys-status">
        [ SYSTEM_LOG ]<br>
        CPU_LOAD: <span id="cpu-val">00</span>% <br>
        KERNEL: V.5.5_STABLE <br>
        NET_MODE: <span id="mode-text">AQUA_CORE</span>
    </div>

    <div class="coord-display" id="coords">X:0.000 Y:0.000</div>

    <div id="loading-screen">
        <div class="loading-text">INITIALIZING SYSTEMS...</div>
        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="vignette"></div>
        <div class="crt-scanlines"></div>
        
        <div class="logo-wrapper parallax-layer" data-strength="40">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="60">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-id="01" data-strength="100">
            <h2><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
            <p class="type-output" data-text="Классический набор текстур включающий в себя: Dark-Aqua, Equipments&Skins, SFX-Pack. Оптимизирован под актуальные билды."></p>
            <div style="display:flex; gap:15px; flex-wrap: wrap;">
                <a href="https://drive.google.com/file/d/1Qw3G5LnlaEteiOD51bF1Oy1uh2A63R9O/view" target="_blank" class="btn">PC EDITION</a>
                <a href="https://drive.google.com/file/d/19GXDO7E-SCvKzvF9ZIklORNZ1xmfN8dC/view" target="_blank" class="btn">Android APK</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-id="02" data-strength="100">
            <h2>PROJECT <span class="night-glow">NIGHT</span></h2>
            <p class="type-output" data-text="Секретный протокол визуализации. Добавляет глубокую механику Тьмы и переработанные шейдеры освещения."></p>
            <a href="https://drive.google.com/file/d/1nIO79tg17x5P7VQxxa_dwtIzr42Kk9fq/view" target="_blank" class="btn">ACCESS_FILES</a>
        </div>

        <div class="footer">
            SIGNAL_LOST // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // REV_5.5_ULTRA
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const logoMain = document.getElementById('logo-main');
        const logoErr = document.getElementById('logo-err');
        const coords = document.getElementById('coords');
        let mouse = { x: -1000, y: -1000 };

        // ГРИД-СИСТЕМА (УЛЬТРА)
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = 60;
            const accent = getComputedStyle(document.documentElement).getPropertyValue('--current-accent').trim();
            
            ctx.strokeStyle = accent;
            ctx.lineWidth = 0.5;

            for (let x = 0; x < canvas.width; x += size) {
                for (let y = 0; y < canvas.height; y += size) {
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    const opacity = Math.max(0.05, 0.4 - dist / 600);
                    ctx.globalAlpha = opacity;
                    
                    // Рисуем точки пересечения вместо сплошных линий для чистоты
                    ctx.beginPath();
                    ctx.arc(x, y, 1, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (dist < 300) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x + (mouse.x - x) * 0.05, y + (mouse.y - y) * 0.05);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        // ПАРАЛЛАКС И МУВМЕНТ (ИДЕАЛЬНЫЙ КОД)
        const updateScene = (x, y) => {
            mouse.x = x; mouse.y = y;
            if(cursor) {
                cursor.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            }
            
            coords.innerText = `X:${(x/100).toFixed(3)} Y:${(y/100).toFixed(3)}`;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const str = layer.getAttribute('data-strength');
                const moveX = (x - centerX) / str;
                const moveY = (y - centerY) / str;
                const isHovered = layer.matches(':hover');
                const scale = isHovered ? 1.05 : 1;
                const rotate = isHovered ? (x - centerX) / 200 : 0;
                
                layer.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) scale(${scale}) rotateY(${rotate}deg)`;
            });
        };

        window.addEventListener('mousemove', (e) => updateScene(e.clientX, e.clientY));
        
        // Поддержка гироскопа для телефонов (Ультра)
        window.addEventListener('deviceorientation', (e) => {
            if (window.innerWidth < 768) {
                const x = (e.gamma + 90) * (window.innerWidth / 180);
                const y = (e.beta + 90) * (window.innerHeight / 180);
                updateScene(x, y);
            }
        });

        // КЛИКИ (ИДЕАЛЬНЫЙ КОД)
        document.addEventListener('mousedown', (e) => {
            cursor?.classList.add('pressed');
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
        document.addEventListener('mouseup', () => cursor?.classList.remove('pressed'));

        // КОНСОЛЬ (ИДЕАЛЬНЫЙ КОД)
        const consoleEl = document.getElementById('term-console');
        const inputEl = document.getElementById('term-input');
        const modeText = document.getElementById('mode-text');

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backquote') {
                e.preventDefault();
                consoleEl.classList.toggle('active');
                if (consoleEl.classList.contains('active')) inputEl.focus();
            }
        });

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.toLowerCase().trim();
                if (cmd === 'red') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--blood-red)');
                    document.documentElement.style.setProperty('--glow', 'rgba(255, 0, 0, 0.4)');
                    document.body.classList.add('red-mode');
                    logoMain.style.backgroundImage = "url('Project_Night_Icon.png')";
                    logoErr.style.backgroundImage = "url('Project_Night_Icon_ERR.png')";
                    modeText.innerText = "NIGHT_PROTOCOL";
                } 
                else if (cmd === 'aqua') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--aqua)');
                    document.documentElement.style.setProperty('--glow', 'rgba(0, 255, 216, 0.4)');
                    document.body.classList.remove('red-mode');
                    logoMain.style.backgroundImage = "url('EV_Dark_2k.png')";
                    logoErr.style.backgroundImage = "url('EV_Dark_2k_ERR.png')";
                    modeText.innerText = "AQUA_CORE";
                }
                if (cmd === 'clear') consoleEl.classList.remove('active');
                inputEl.value = '';
            }
        });

        // ПРИНТЕР (ИДЕАЛЬНЫЙ КОД)
        function startTyping() {
            document.querySelectorAll('.type-output').forEach(el => {
                const text = el.getAttribute('data-text');
                let charIdx = 0; el.innerText = '';
                const type = setInterval(() => {
                    el.innerText += text[charIdx];
                    charIdx++;
                    if (charIdx >= text.length) clearInterval(type);
                }, 25);
            });
        }

        // СКРАМБЛЕР (ИДЕАЛЬНЫЙ КОД)
        const nick = document.getElementById('nickname');
        const original = nick.innerText;
        nick.onmouseover = () => {
            let i = 0;
            const iter = setInterval(() => {
                nick.innerText = original.split("").map((l, idx) => idx < i ? original[idx] : "!@#$%^&*()"[Math.floor(Math.random()*10)]).join("");
                if (i >= original.length) clearInterval(iter);
                i += 1/3;
            }, 40);
        };

        // ИНИЦИАЛИЗАЦИЯ
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    startTyping();
                }, 1200);
                document.getElementById('main-content').style.opacity = '1';
            }, 3500);
            
            // CPU Simulation
            setInterval(() => { 
                document.getElementById('cpu-val').innerText = (Math.random()*20 + 5).toFixed(1); 
            }, 1500);
        });
    </script>
</body>
</html>
