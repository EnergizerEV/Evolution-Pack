<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="aqua-mode">

    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>
    <div class="vignette" id="vignette"></div>

    <div class="social-sidebar">
        <a href="https://www.youtube.com/@energizerSAS4" target="_blank" class="social-link" title="YouTube"><i class="fab fa-youtube"></i></a>
        <a href="https://discord.gg/6heUegeJWj" target="_blank" class="social-link" title="Discord"><i class="fab fa-discord"></i></a>
        <a href="https://www.tiktok.com/@energizerev_sas4" target="_blank" class="social-link" title="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>

    <div id="term-console">
        <span style="color:var(--current-accent)">EVO_OS ></span>
        <input type="text" id="term-input" placeholder="Type command..." autocomplete="off">
    </div>

    <div id="loading-screen">
        <div class="loading-text">INITIALIZING EVO_OS...</div>
        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="main-content">
    <div class="crt-scanlines"></div>
    <div class="scan-line"></div>
    
    <div class="zoom-wrapper">
        <div class="logo-wrapper parallax-layer" data-strength="60">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="90">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="150">
            <h2><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
            <p class="type-output" data-text="A classic texture pack that includes Dark-Aqua, Equipments & Skins."></p>
            <div style="display:flex; gap:12px;">
                <a href="..." class="btn">PC</a>
                <a href="..." class="btn">Android</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-strength="150">
            <h2>PROJECT <span class="night-glow">NIGHT</span></h2>
            <p class="type-output" data-text="Night theme, new interface, and much more!"></p>
            <a href="..." class="btn">Access Files</a>
        </div>
    </div> <div id="sys-status">
        CPU_LOAD: <span id="cpu-val">00</span>% 
        <span>SYSTEM: STABLE</span> 
        MODE: <span id="mode-text">AQUA_CORE</span>
    </div>

    <div class="footer">
        UNAUTHORIZED ACCESS // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // V.5.5
    </div>
</div>

        <div class="demo-footer-text">Demo version</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
