<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--aqua);
            font-family: 'Source Code Pro', monospace;
            transition: opacity 1s ease, visibility 1s;
        }

        .loading-text {
            font-size: 14px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            min-height: 20px;
        }

        .progress-bar-container {
            width: 200px;
            height: 2px;
            background: rgba(0, 255, 216, 0.1);
            border: 1px solid rgba(0, 255, 216, 0.3);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            position: absolute;
            height: 100%;
            width: 0%;
            background: var(--aqua);
            box-shadow: 0 0 15px var(--aqua);
            animation: loadProgress 4s cubic-bezier(0.1, 0, 0.2, 1) forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            opacity: 0;
            transition: opacity 2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 1000;
        }

        .crt-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.4;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 1010;
            background: linear-gradient(0deg, rgba(0, 255, 216, 0) 0%, rgba(0, 255, 216, 0.05) 50%, rgba(0, 255, 216, 0) 100%);
            position: fixed; top: -100px; left: 0; pointer-events: none;
            animation: scanline-run 10s linear infinite;
        }

        @keyframes scanline-run { 0% { top: -100px; } 100% { top: 100%; } }

        /* ЛОГОТИП (ВОССТАНОВЛЕН) */
        .logo-wrapper {
            position: relative; width: 150px; height: 150px; margin-bottom: 20px; z-index: 10;
        }

        .glitch-logo {
            position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 10px var(--aqua)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; }

        @keyframes glitch-step {
            0%, 90%, 100% { opacity: 0; transform: none; }
            92% { opacity: 1; transform: translate(6px, -3px); filter: hue-rotate(45deg); }
            94% { opacity: 1; transform: translate(-6px, 3px); filter: saturate(2); }
            95% { opacity: 0.4; transform: scale(1.05); }
        }

        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; z-index: 10; margin: 10px 0; }
        .header h1 span { color: var(--aqua); }

        /* КАРТОЧКИ (ВОССТАНОВЛЕНЫ + ЭФФЕКТ INTERLACE) */
        .card {
            background: rgba(10, 15, 20, 0.9); border: 1px solid #1a262b; padding: 40px; width: 100%; max-width: 600px; margin-bottom: 30px;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; z-index: 20;
            overflow: hidden; /* Чтобы эффект помех не выходил за границы */
        }

        /* Псевдо-слой для помех внутри карточки */
        .card::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255
