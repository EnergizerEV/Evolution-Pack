<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal v.6.4 Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
        }

        /* БАЗОВЫЕ НАСТРОЙКИ */
        html, body {
            overflow: hidden; height: 100%; margin: 0; padding: 0;
            background-color: var(--bg-color); color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
        }

        * { cursor: none !important; }

        /* ЭФФЕКТ ПЕРЕХОДА (DIGITAL GLITCH) */
        #mode-glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; z-index: 100000; pointer-events: none; opacity: 0;
        }
        .glitch-bar {
            position: absolute; width: 100%; height: 2px;
            background: var(--current-accent); box-shadow: 0 0 15px var(--current-accent);
        }

        /* АТМОСФЕРА И ТЕКСТУРЫ */
        .fog-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            opacity: 0.05; pointer-events: none; z-index: 9998;
        }
        .fog-layer {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0, 255, 216, 0.03) 50%, rgba(0,0,0,0.2) 80%);
            filter: blur(80px); animation: fog-animation 25s ease-in-out infinite alternate;
            pointer-events: none; z-index: 9996;
        }
        @keyframes fog-animation {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(5deg); }
        }

        /* CRT ЭФФЕКТЫ */
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.08), transparent);
            opacity: 0.15; pointer-events: none; z-index: 1001; animation: scanning-move 4.5s linear infinite;
        }
        @keyframes scanning-move { 0% { transform: translateY(-120px); } 100% { transform: translateY(100vh); } }

        .crt-scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.35;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.92) 100%);
            pointer-events: none; z-index: 1000;
        }

        #grid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.18; pointer-events: none; }

        /* КУРСОР */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 99999; will-change: transform; transform: translate(-50%, -50%);
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        .ripple {
            position: fixed; border: 2px solid var(--current-accent); border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%); z-index: 9998;
            animation: ripple-effect 0.65s cubic-bezier(0, 0.2, 0.8, 1) forwards;
        }
        @keyframes ripple-effect { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 180px; height: 180px; opacity: 0; } }

        /* КОНСОЛЬ (V.5.5) */
        #term-console {
            position: fixed; top: -180px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(2, 4, 6, 0.98);
            border: 1px solid var(--current-accent); padding: 20px; z-index: 10000;
            font-family: 'Source Code Pro', monospace; transition: top 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
        }
        #term-console.active { top: 35px; }
        #term-input { background: transparent; border: none; color: #fff; width: 85%; outline: none; font-family: inherit; font-size: 16px; caret-color: var(--current-accent); }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-content { opacity: 0; transition: opacity 2.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; position: relative; }

        /* ЛОГОТИПЫ */
        .logo-wrapper { position: relative; width: 160px; height: 160px; margin-bottom: 25px; z-index: 10; }
        .logo-layer { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: background-image 0.4s ease; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 20px var(--current-accent)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: logo-jitter-anim 4s infinite step-end; }
        @keyframes logo-jitter-anim { 0%, 88%, 100% { opacity: 0; } 90% { opacity: 0.8; transform: translate(6px, -3px) skewX(10deg); } 92% { opacity: 0.8; transform: translate(-6px, 3px) skewX(-10deg); } }

        .header h1 { font-size: 2.4rem; letter-spacing: 14px; text-transform: uppercase; margin: 15px 0; text-align: center; font-weight: 700; }
        .header h1 span { color: var(--current-accent); text-shadow: 0 0 20px var(--current-accent); transition: all 0.5s; }

        /* КАРТОЧКИ (ВОЗВРАТ К ИДЕАЛЬНОМУ ХОВЕРУ) */
        .card {
            background: rgba(10, 15, 20, 0.93); border: 1px solid #1a262b; padding: 45px;
            width: 100%; max-width: 620px; margin-bottom: 35px; position: relative; z-index: 20;
            backdrop-filter: blur(5px); transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), border 0.4s ease, box-shadow 0.4s ease, background 0.4s;
            will-change: transform;
        }
        .card h2 { margin-top: 0; font-size: 1.5rem; letter-spacing: 2px; color: #fff; font-weight: 400; }
        .card h2 span { transition: color 0.4s, text-shadow 0.4s; }

        /* ЭФФЕКТ ТОЧЕЧНОГО ПОДСВЕЧИВАНИЯ БУКВ */
        .card:hover h2 span {
            color: var(--current-accent);
            text-shadow: 0 0 15px var(--current-accent);
        }

        .aqua-style:hover {
            border-left: 6px solid var(--aqua);
            box-shadow: 0 0 60px rgba(0, 255, 216, 0.2);
            transform: scale(1.03) translateY(-5px);
            background: rgba(12, 20, 25, 0.96); /* Вернул правильный цвет фона */
        }

        .night-style:hover {
            border-left: 6px solid var(--blood-red);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.25);
            transform: scale(1.03) translateY(-5px);
            background: rgba(20, 12, 12, 0.96);
        }

        .typewriter-box { font-size: 0.88rem; color: #8da0a9; line-height: 1.7; min-height: 3.5em; font-family: 'Source Code Pro', monospace; }

        /* КНОПКИ */
        .btn {
            display: inline-block; padding: 14px 30px; text-decoration: none; font-weight: 700; font-size: 0.78rem;
            text-transform: uppercase; border: 1px solid #1a262b; transition: all 0.3s ease; margin-top: 20px;
            color: #555; letter-spacing: 2px;
        }
        .card:hover .btn { border-color: inherit; color: inherit; }
        .btn:hover {
            background: #fff !important; color: #000 !important;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            animation: fast-flicker 1s infinite linear;
        }
        @keyframes fast-flicker { 0% { opacity: 1; } 20% { opacity: 0.7; } 40% { opacity: 1; } 60% { opacity: 0.8; } 80% { opacity: 0.4; } 100% { opacity: 1; } }

        /* ФУТЕР И СТАТУС */
        .footer { margin-top: 35px; font-size: 0.68rem; color: #333; letter-spacing: 3px; z-index: 10; }
        #sys-status { position: fixed; bottom: 30px; left: 30px; font-family: 'Source Code Pro', monospace; font-size: 11px; color: var(--current-accent); opacity: 0.6; line-height: 1.8; pointer-events: none; text-shadow: 0 0 5px var(--current-accent); }

        /* ЗАГРУЗКА СО СВЕЧЕНИЕМ */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 100010; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .load-text { 
            color: var(--aqua); font-family: 'Source Code Pro', monospace; font-size: 14px; 
            margin-bottom: 15px; letter-spacing: 3px; 
            text-shadow: 0 0 15px var(--aqua), 0 0 30px var(--aqua); 
            animation: pulse-glow 2s infinite ease-in-out;
        }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .load-bar-container { width: 300px; height: 3px; background: rgba(0, 255, 216, 0.05); position: relative; border: 1px solid rgba(0, 255, 216, 0.2); }
        .load-bar-fill { 
            position: absolute; height: 100%; width: 0; background: var(--aqua); 
            box-shadow: 0 0 20px var(--aqua), 0 0 40px var(--aqua);
            animation: load-anim 3.2s forwards cubic-bezier(0.15, 0, 0.3, 1); 
        }
        @keyframes load-anim { to { width: 100%; } }
    </style>
</head>
<body class="aqua-mode">

    <div id="mode-glitch-overlay"></div>
    <div class="fog-overlay"></div>
    <div class="fog-layer"></div>
    <div class="scan-line"></div>
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <div style="color:var(--current-accent); font-size: 10px; margin-bottom: 5px; opacity: 0.7;">[STATION_ACTIVE_v.6.4]</div>
        <span style="color:var(--current-accent)">EVO_OS > </span>
        <input type="text" id="term-input" placeholder="..." autocomplete="off">
    </div>

    <div id="sys-status">
        [ CPU: <span id="cpu-val">00</span>% ] <br>
        [ STATUS: ENCRYPTED ] <br>
        [ MODE: <span id="mode-text">AQUA_CORE</span> ]
    </div>

    <div id="loading-screen">
        <div class="load-text" id="load-status">INITIALIZING_EVO_OS...</div>
        <div class="load-bar-container"><div class="load-bar-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="vignette"></div>
        <div class="crt-scanlines"></div>
        
        <div class="logo-wrapper parallax-node" data-speed="45">
            <div id="logo-main" class="logo-layer logo-base"></div>
            <div id="logo-err" class="logo-layer logo-glitch"></div>
        </div>

        <div class="header parallax-node" data-speed="75">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-node" data-speed="110">
            <h2><span>EV</span>olution <span>Pa</span>ck</h2>
            <div class="typewriter-box" data-text="Премиальный набор текстур. Включает полную замену UI, уникальные модели снаряжения и переработанную библиотеку звуков SFX-Pack."></div>
            <div style="display:flex; gap:15px;">
                <a href="https://drive.google.com/file/d/1Qw3G5LnlaEteiOD51bF1Oy1uh2A63R9O/view" target="_blank" class="btn">PC</a>
                <a href="https://drive.google.com/file/d/19GXDO7E-SCvKzvF9ZIklORNZ1xmfN8dC/view" target="_blank" class="btn">Android</a>
            </div>
        </div>

        <div class="card night-style parallax-node" data-speed="110">
            <h2>PROJECT <span>NIGHT</span></h2>
            <div class="typewriter-box" data-text="Экспериментальный протокол визуализации. Максимальное погружение через контрастные аномалии и механику 'Абсолютной Тьмы'."></div>
            <a href="https://drive.google.com/file/d/1nIO79tg17x5P7VQxxa_dwtIzr42Kk9fq/view" target="_blank" class="btn">Access Files</a>
        </div>

        <div class="footer">
            SECURE_LINK // <div class="scramble-node" id="nickname" style="display:inline-block; font-family:monospace; cursor:pointer;">M45T0D0NM4N</div> // 2026
        </div>
    </div>

    <script>
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');
        const input = document.getElementById('term-input');
        const overlay = document.getElementById('mode-glitch-overlay');

        let mouse = { x: -1000, y: -1000 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--current-accent').trim();
            ctx.strokeStyle = accentColor;
            ctx.lineWidth = 0.5;
            const step = 60;
            for (let x = 0; x < canvas.width; x += step) {
                for (let y = 0; y < canvas.height; y += step) {
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    ctx.globalAlpha = Math.max(0.08, 0.45 - dist / 350);
                    ctx.strokeRect(x, y, step, step);
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            document.querySelectorAll('.parallax-node').forEach(node => {
                const s = node.getAttribute('data-speed');
                const x = (e.clientX - cx) / s, y = (e.clientY - cy) / s;
                const scale = (node.matches(':hover') && node.classList.contains('card')) ? 'scale(1.03)' : 'scale(1)';
                node.style.transform = `translate3d(${x}px, ${y}px, 0) ${scale}`;
            });
        });

        document.addEventListener('mousedown', (e) => {
            cursor.classList.add('pressed');
            const r = document.createElement('div'); r.className = 'ripple';
            r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
            document.body.appendChild(r); setTimeout(() => r.remove(), 700);
        });
        document.addEventListener('mouseup', () => cursor.classList.remove('pressed'));

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backquote') {
                e.preventDefault();
                document.getElementById('term-console').classList.toggle('active');
                if (document.getElementById('term-console').classList.contains('active')) input.focus();
            }
        });

        function triggerGlitch(callback) {
            overlay.style.opacity = '1';
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div'); bar.className = 'glitch-bar';
                bar.style.top = Math.random() * 100 + '%'; bar.style.height = Math.random() * 6 + 'px';
                overlay.appendChild(bar);
            }
            setTimeout(() => {
                callback(); overlay.innerHTML = ''; overlay.style.opacity = '0';
            }, 200);
        }

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.toLowerCase().trim();
                if (cmd === 'red') {
                    triggerGlitch(() => {
                        document.documentElement.style.setProperty('--current-accent', 'var(--blood-red)');
                        document.body.classList.add('red-mode');
                        document.getElementById('logo-main').style.backgroundImage = "url('Project_Night_Icon.png')";
                        document.getElementById('logo-err').style.backgroundImage = "url('Project_Night_Icon_ERR.png')";
                        document.getElementById('mode-text').innerText = "NIGHT_PROTOCOL";
                    });
                } else if (cmd === 'aqua') {
                    triggerGlitch(() => {
                        document.documentElement.style.setProperty('--current-accent', 'var(--aqua)');
                        document.body.classList.remove('red-mode');
                        document.getElementById('logo-main').style.backgroundImage = "url('EV_Dark_2k.png')";
                        document.getElementById('logo-err').style.backgroundImage = "url('EV_Dark_2k_ERR.png')";
                        document.getElementById('mode-text').innerText = "AQUA_CORE";
                    });
                }
                input.value = '';
            }
        });

        function runPrinter() {
            document.querySelectorAll('.typewriter-box').forEach(box => {
                const txt = box.getAttribute('data-text'); let idx = 0; box.innerHTML = '';
                const typing = setInterval(() => {
                    box.innerHTML += txt.charAt(idx); idx++;
                    if (idx >= txt.length) clearInterval(typing);
                }, 25);
            });
        }

        window.addEventListener('load', () => {
            const statusArr = ["SYNCING_FILES...", "ENCRYPTING...", "FINALIZING...", "WELCOME"];
            let sIdx = 0;
            const logInterval = setInterval(() => {
                document.getElementById('load-status').innerText = statusArr[sIdx]; sIdx++;
                if (sIdx >= statusArr.length) clearInterval(logInterval);
            }, 800);

            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('main-content').style.opacity = '1';
                    runPrinter();
                }, 1000);
            }, 3500);
            setInterval(() => { document.getElementById('cpu-val').innerText = Math.floor(Math.random() * 10) + 5; }, 2500);
        });

        const nick = document.getElementById('nickname');
        const originalNick = nick.innerText;
        nick.onmouseover = () => {
            let iter = 0;
            const scrambler = setInterval(() => {
                nick.innerText = originalNick.split("").map((char, index) => {
                    if (index < iter) return originalNick[index];
                    return "X#$@&01"[Math.floor(Math.random() * 7)];
                }).join("");
                if (iter >= originalNick.length) clearInterval(scrambler);
                iter += 1/3;
            }, 35);
        };
    </script>
</body>
</html>
