<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution | Terminal Ultra Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
            --glow: rgba(0, 255, 216, 0.4);
        }

        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
        }

        * { cursor: none !important; -webkit-tap-highlight-color: transparent; }

        /* СКАН-ЛИНИЯ (ИДЕАЛЬНЫЙ КОД) */
        .scan-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.08), transparent);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1001;
            animation: scanning 6s linear infinite;
        }
        @keyframes scanning {
            0% { transform: translateY(-120px); }
            100% { transform: translateY(100vh); }
        }

        /* ПОЛОСАТЫЕ УЗОРЫ ТЕРМИНАЛА (CRT EFFECT) */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.5) 100%);
            pointer-events: none; z-index: 9997;
        }

        /* КУРСОР (ИДЕАЛЬНЫЙ КОД) */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 999999; will-change: transform;
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        .click-ripple {
            position: fixed; border: 2px solid var(--current-accent);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 9998; animation: ripple-out 0.6s ease-out forwards;
        }
        @keyframes ripple-out {
            0% { width: 0; height: 0; opacity: 0.8; }
            100% { width: 180px; height: 180px; opacity: 0; border-width: 1px; }
        }

        #grid-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -1; opacity: 0.2; pointer-events: none; 
        }

        /* КОНСОЛЬ */
        #term-console {
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 650px; background: rgba(2, 8, 8, 0.98);
            border: 1px solid var(--current-accent); padding: 25px;
            z-index: 100000; font-family: 'Source Code Pro', monospace;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }
        #term-console.active { top: 40px; }
        #term-input {
            background: transparent; border: none; color: #fff; width: 80%;
            outline: none; font-family: inherit; font-size: 16px; caret-color: var(--current-accent);
        }

        /* КОНТЕНТ */
        #main-content { 
            opacity: 0; 
            transition: opacity 2.5s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
            height: 100vh; 
            overflow-y: scroll;
            scrollbar-width: none; 
            padding: 100px 0;
            perspective: 1200px;
        }
        #main-content::-webkit-scrollbar { display: none; }

        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 1000; }

        /* ЛОГОТИП */
        .logo-wrapper { position: relative; width: 160px; height: 160px; margin-bottom: 30px; z-index: 10; flex-shrink: 0; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: 0.4s; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 20px var(--current-accent)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 5s infinite step-end; }
        
        @keyframes glitch-step { 
            0%, 88%, 100% { opacity: 0; transform: none; } 
            90% { opacity: 1; transform: translate(8px, -4px); } 
            93% { opacity: 1; transform: translate(-8px, 4px); } 
        }

        .header h1 { 
            font-size: 2.8rem; letter-spacing: 15px; text-transform: uppercase; 
            margin: 15px 0; text-align: center;
        }
        .header h1 span { color: var(--current-accent); transition: 0.4s; }

        /* КАРТОЧКИ С ИСПРАВЛЕННОЙ ВЫСОТОЙ */
        .card {
            background: rgba(10, 15, 20, 0.92); 
            border: 1px solid rgba(26, 38, 43, 0.8); 
            padding: 40px; 
            width: 85%; max-width: 600px; 
            margin-bottom: 40px; 
            position: relative; z-index: 20;
            transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), border 0.4s, box-shadow 0.4s;
            backdrop-filter: blur(5px);
            min-height: 250px; /* Фикс для текста */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h2 { margin-top: 0; color: #fff; transition: 0.4s; font-weight: normal; font-size: 1.4rem; }
        .glow-part, .night-glow { transition: 0.4s; color: #fff; }

        .aqua-style:hover { 
            border-left: 5px solid var(--current-accent); 
            box-shadow: 0 0 50px rgba(0, 255, 216, 0.15); 
            background: rgba(10, 25, 25, 0.95);
        }
        .aqua-style:hover .glow-part { color: var(--current-accent); text-shadow: 0 0 20px var(--current-accent); font-weight: bold; }

        .night-style:hover { 
            border-left: 5px solid var(--blood-red); 
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2); 
            background: rgba(25, 10, 10, 0.95);
        }
        .night-style:hover .night-glow { color: var(--blood-red); text-shadow: 0 0 20px var(--blood-red); font-weight: bold; }

        .type-output { font-size: 0.85rem; color: #8da0a9; line-height: 1.6; min-height: 4em; margin-bottom: 10px; }

        /* ВОССТАНОВЛЕННОЕ МЕРЦАНИЕ КНОПОК */
        .btn {
            display: inline-block; padding: 12px 28px; text-decoration: none; font-weight: bold; font-size: 0.75rem; 
            text-transform: uppercase; border: 1px solid #1a262b; transition: 0.3s; color: #555; position: relative; width: fit-content;
        }
        .card:hover .btn { border-color: inherit; color: inherit; }
        .btn:hover { 
            background: #fff !important; 
            color: #000 !important; 
            animation: btn-flicker 1.5s ease-in-out infinite; /* Фикс мерцания */
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
        }

        @keyframes btn-flicker {
            0%, 100% { opacity: 1; }
            15% { opacity: 0.4; }
            30% { opacity: 1; }
            45% { opacity: 0.7; }
            60% { opacity: 1; }
            85% { opacity: 0.8; }
        }

        /* ЗАГРУЗКА */
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            color: var(--aqua); font-family: 'Source Code Pro', monospace; 
        }
        .loading-text { letter-spacing: 5px; margin-bottom: 15px; }
        .progress-bar-container { width: 250px; height: 2px; background: rgba(0, 255, 216, 0.1); border: 1px solid rgba(0, 255, 216, 0.3); position: relative; }
        .progress-bar-fill { position: absolute; height: 100%; width: 0%; background: var(--aqua); box-shadow: 0 0 15px var(--aqua); animation: loadProgress 3.5s forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        #sys-status { position: fixed; bottom: 25px; left: 25px; font-family: 'Source Code Pro', monospace; font-size: 10px; color: var(--current-accent); opacity: 0.5; pointer-events: none; z-index: 10001; }
        .footer { margin-top: 20px; font-size: 0.65rem; color: #333; text-align: center; letter-spacing: 2px; padding-bottom: 50px; }
        .scramble-text { cursor: pointer; color: #444; }

        @media (max-width: 768px) {
            * { cursor: auto !important; }
            #custom-cursor { display: none; }
            .card { width: 85%; padding: 30px; min-height: auto; }
            .header h1 { font-size: 1.6rem; letter-spacing: 6px; }
            .logo-wrapper { width: 120px; height: 120px; }
        }
    </style>
</head>
<body class="aqua-mode">

    <div class="crt-overlay"></div>
    <div class="scan-line"></div>
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <span style="color:var(--current-accent)">EVO_OS ></span>
        <input type="text" id="term-input" placeholder="Type command..." autocomplete="off">
    </div>

    <div id="sys-status">
        CPU_LOAD: <span id="cpu-val">00</span>% <br>
        SYSTEM: STABLE <br>
        MODE: <span id="mode-text">AQUA_CORE</span>
    </div>

    <div id="loading-screen">
        <div class="loading-text">INITIALIZING EVO_OS...</div>
        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="vignette"></div>
        
        <div class="logo-wrapper parallax-layer" data-strength="50">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="80">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="120">
            <div>
                <h2><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
                <p class="type-output" data-text="Классический набор текстур включающий в себя: Dark-Aqua, Equipments&Skins, SFX-Pack."></p>
            </div>
            <div style="display:flex; gap:12px; flex-wrap: wrap;">
                <a href="https://drive.google.com/file/d/1Qw3G5LnlaEteiOD51bF1Oy1uh2A63R9O/view" target="_blank" class="btn">PC</a>
                <a href="https://drive.google.com/file/d/19GXDO7E-SCvKzvF9ZIklORNZ1xmfN8dC/view" target="_blank" class="btn">Android</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-strength="120">
            <div>
                <h2>PROJECT <span class="night-glow">NIGHT</span></h2>
                <p class="type-output" data-text="Набор Текстур, добавляющий механику 'Тьмы'. На грани возможного."></p>
            </div>
            <a href="https://drive.google.com/file/d/1nIO79tg17x5P7VQxxa_dwtIzr42Kk9fq/view" target="_blank" class="btn">Access Files</a>
        </div>

        <div class="footer">
            UNAUTHORIZED ACCESS // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // V.5.5_ULTRA_FIXED
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const logoMain = document.getElementById('logo-main');
        const logoErr = document.getElementById('logo-err');
        let mouse = { x: -1000, y: -1000 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const size = 50;
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--current-accent').trim();
            ctx.lineWidth = 0.5;
            for (let x = 0; x < canvas.width; x += size) {
                for (let y = 0; y < canvas.height; y += size) {
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    const offset = Math.max(0, 10 - dist / 30);
                    ctx.globalAlpha = offset > 0 ? 0.6 : 0.15;
                    ctx.strokeRect(x - offset/2, y - offset/2, size + offset, size + offset);
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        const updateUI = (x, y) => {
            mouse.x = x; mouse.y = y;
            if(cursor) cursor.style.transform = `translate3d(${x}px, ${y}px, 0)`;

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const str = layer.getAttribute('data-strength');
                const moveX = (x - centerX) / str;
                const moveY = (y - centerY) / str;
                const isHovered = layer.matches(':hover');
                const scale = isHovered ? 1.04 : 1;
                // Поворот от курсора
                const rotateY = isHovered ? (x - centerX) / 250 : 0;
                const rotateX = isHovered ? (centerY - y) / 250 : 0;
                
                layer.style.transform = `translate3d(${moveX}px, ${moveY}px, 0) scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
        };

        window.addEventListener('mousemove', (e) => updateUI(e.clientX, e.clientY));
        window.addEventListener('touchmove', (e) => updateUI(e.touches[0].clientX, e.touches[0].clientY));

        document.addEventListener('mousedown', (e) => {
            cursor?.classList.add('pressed');
            const ripple = document.createElement('div');
            ripple.className = 'click-ripple';
            ripple.style.left = e.clientX + 'px'; ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });
        document.addEventListener('mouseup', () => cursor?.classList.remove('pressed'));

        const consoleEl = document.getElementById('term-console');
        const inputEl = document.getElementById('term-input');
        const modeText = document.getElementById('mode-text');

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backquote') {
                e.preventDefault();
                consoleEl.classList.toggle('active');
                if (consoleEl.classList.contains('active')) inputEl.focus();
            }
        });

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.toLowerCase().trim();
                if (cmd === 'red') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--blood-red)');
                    document.body.classList.add('red-mode');
                    logoMain.style.backgroundImage = "url('Project_Night_Icon.png')";
                    logoErr.style.backgroundImage = "url('Project_Night_Icon_ERR.png')";
                    modeText.innerText = "NIGHT_PROTOCOL";
                } 
                else if (cmd === 'aqua') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--aqua)');
                    document.body.classList.remove('red-mode');
                    logoMain.style.backgroundImage = "url('EV_Dark_2k.png')";
                    logoErr.style.backgroundImage = "url('EV_Dark_2k_ERR.png')";
                    modeText.innerText = "AQUA_CORE";
                }
                if (cmd === 'clear') consoleEl.classList.remove('active');
                inputEl.value = '';
            }
        });

        function startTyping() {
            document.querySelectorAll('.type-output').forEach(el => {
                const text = el.getAttribute('data-text');
                let charIdx = 0; el.innerText = '';
                const type = setInterval(() => {
                    el.innerText += text[charIdx];
                    charIdx++;
                    if (charIdx >= text.length) clearInterval(type);
                }, 30);
            });
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    startTyping();
                }, 1000);
                document.getElementById('main-content').style.opacity = '1';
            }, 3500);
            setInterval(() => { document.getElementById('cpu-val').innerText = Math.floor(Math.random()*15)+5; }, 2000);
        });
    </script>
</body>
</html>
