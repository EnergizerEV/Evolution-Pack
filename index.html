<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evolution | Terminal Ultra Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
        }

        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
        }

        * { cursor: none !important; -webkit-tap-highlight-color: transparent; }

        /* CRT СЕТКА И СКАН-ЛИНИЯ */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 9999; opacity: 0.5;
        }

        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.05), transparent);
            opacity: 0.1; pointer-events: none; z-index: 1001;
            animation: scanning 8s linear infinite;
        }
        @keyframes scanning { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }

        /* КУРСОР */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 999999; will-change: transform;
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        #grid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none; }

        /* КОНСОЛЬ */
        #term-console {
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(5, 10, 10, 0.98);
            border: 1px solid var(--current-accent); padding: 20px;
            z-index: 100000; font-family: 'Source Code Pro', monospace;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #term-console.active { top: 30px; }
        #term-input { background: transparent; border: none; color: #fff; width: 80%; outline: none; caret-color: var(--current-accent); }

        /* КОНТЕНТ */
        #main-content { 
            opacity: 0; transition: opacity 2s ease; 
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; height: 100vh; overflow-y: scroll; scrollbar-width: none; 
            padding: 80px 0; perspective: 1500px; /* Глубокая перспектива */
        }
        #main-content::-webkit-scrollbar { display: none; }

        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 20px; transform-style: preserve-3d; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; transition: 0.4s; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 15px var(--current-accent)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; }
        
        @keyframes glitch-step { 0%, 90% { opacity: 0; } 92% { opacity: 1; transform: translate(5px, -3px); } 94% { opacity: 1; transform: translate(-5px, 3px); } }

        .header h1 { font-size: 2.5rem; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        .header span { color: var(--current-accent); }

        /* КАРТОЧКИ */
        .card {
            background: rgba(10, 15, 20, 0.9); border: 1px solid rgba(26, 38, 43, 0.5); 
            padding: 40px; width: 85%; max-width: 580px; margin-bottom: 35px; 
            position: relative; z-index: 20; transform-style: preserve-3d;
            transition: border 0.4s, box-shadow 0.4s, background 0.4s;
            backdrop-filter: blur(8px); min-height: 260px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .card h2 { margin: 0; font-weight: normal; font-size: 1.4rem; color: #fff; pointer-events: none; }
        .glow-part, .night-glow { transition: 0.4s; }

        .aqua-style:hover { border-left: 5px solid var(--current-accent); box-shadow: 0 0 40px rgba(0, 255, 216, 0.1); background: rgba(10, 25, 25, 0.95); }
        .aqua-style:hover .glow-part { color: var(--current-accent); text-shadow: 0 0 15px var(--current-accent); }

        .night-style:hover { border-left: 5px solid var(--blood-red); box-shadow: 0 0 40px rgba(255, 0, 0, 0.15); background: rgba(25, 10, 10, 0.95); }
        .night-style:hover .night-glow { color: var(--blood-red); text-shadow: 0 0 15px var(--blood-red); }

        .type-output { font-size: 0.85rem; color: #8da0a9; line-height: 1.6; min-height: 4.5em; margin: 15px 0; font-family: 'Source Code Pro', monospace; }

        /* КНОПКИ */
        .btn {
            display: inline-block; padding: 12px 28px; text-decoration: none; font-weight: bold; font-size: 0.75rem; 
            text-transform: uppercase; border: 1px solid #1a262b; transition: 0.3s; color: #444; width: fit-content;
        }
        .card:hover .btn { border-color: inherit; color: inherit; }
        .btn:hover { 
            background: #fff !important; color: #000 !important; 
            animation: btn-flicker 1.5s infinite; box-shadow: 0 0 20px #fff;
        }
        @keyframes btn-flicker { 0%, 100% { opacity: 1; } 20% { opacity: 0.5; } 40% { opacity: 0.9; } 60% { opacity: 0.6; } }

        /* ФУТЕР И ЗАГРУЗКА */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--aqua); }
        .progress-bar-container { width: 220px; height: 2px; background: rgba(0, 255, 216, 0.1); margin-top: 15px; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--aqua); box-shadow: 0 0 15px var(--aqua); animation: loadProgress 3s forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        #sys-status { position: fixed; bottom: 20px; left: 20px; font-family: 'Source Code Pro'; font-size: 10px; color: var(--current-accent); opacity: 0.5; }
        .footer { padding: 40px 0; font-size: 0.65rem; color: #222; text-align: center; letter-spacing: 2px; }
        .scramble-text { cursor: pointer; display: inline-block; }

        @media (max-width: 768px) {
            #custom-cursor { display: none; }
            .card { width: 88%; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>
    <div class="scan-line"></div>
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <span style="color:var(--current-accent)">EVO_OS ></span>
        <input type="text" id="term-input" placeholder="Type..." autocomplete="off">
    </div>

    <div id="sys-status">CPU: <span id="cpu-val">00</span>% | STABLE | <span id="mode-text">AQUA_CORE</span></div>

    <div id="loading-screen">
        <div class="loading-text" style="letter-spacing: 5px;">INITIALIZING...</div>
        <div class="progress-bar-container"><div class="progress-bar-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="logo-wrapper parallax-layer" data-strength="40">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="70">
            <h1 class="scramble-trigger"><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="100">
            <div>
                <h2 class="scramble-trigger"><span class="glow-part">EV</span>olution <span class="glow-part">Pa</span>ck</h2>
                <p class="type-output" data-text="Классический набор текстур включающий в себя: Dark-Aqua, Equipments&Skins, SFX-Pack. Полная интеграция."></p>
            </div>
            <div style="display:flex; gap:12px;">
                <a href="#" class="btn">PC</a>
                <a href="#" class="btn">Android</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-strength="100">
            <div>
                <h2 class="scramble-trigger">PROJECT <span class="night-glow">NIGHT</span></h2>
                <p class="type-output" data-text="Набор Текстур, добавляющий механику 'Тьмы'. Визуальное искажение реальности на грани возможного."></p>
            </div>
            <a href="#" class="btn">Access Files</a>
        </div>

        <div class="footer">
            UNAUTHORIZED // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // V.5.5
        </div>
    </div>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x: -1000, y: -1000 };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--current-accent').trim();
            ctx.lineWidth = 0.5;
            for (let x = 0; x < canvas.width; x += 50) {
                for (let y = 0; y < canvas.height; y += 50) {
                    const dist = Math.hypot(x - mouse.x, y - mouse.y);
                    ctx.globalAlpha = Math.max(0.1, 0.6 - dist/300);
                    ctx.strokeRect(x, y, 50, 50);
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        // SCRAMBLE EFFECT (ШИФРУ ПРИКОЛЫ)
        const chars = "!@#$%^&*()_+{}:<>?[]/|~";
        function scramble(el, originalText) {
            let iteration = 0;
            const interval = setInterval(() => {
                el.innerHTML = originalText.split("").map((char, index) => {
                    if(index < iteration) return originalText[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
                if(iteration >= originalText.length) clearInterval(interval);
                iteration += 1/3;
            }, 30);
        }

        document.querySelectorAll('.scramble-trigger, .scramble-text').forEach(el => {
            const original = el.innerText;
            el.addEventListener('mouseenter', () => scramble(el, original));
        });

        // 3D ПАРАЛЛАКС И ПОВОРОТЫ
        const update = (e) => {
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            mouse.x = x; mouse.y = y;
            if(cursor) cursor.style.transform = `translate3d(${x}px, ${y}px, 0)`;

            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            document.querySelectorAll('.parallax-layer').forEach(layer => {
                const str = layer.getAttribute('data-strength');
                const rx = (cy - y) / (str / 2); // Наклон по X
                const ry = (x - cx) / (str / 2); // Наклон по Y
                const mx = (x - cx) / str;
                const my = (y - cy) / str;
                
                const isHovered = layer.matches(':hover');
                const scale = isHovered ? 1.05 : 1;

                layer.style.transform = `translate3d(${mx}px, ${my}px, 0) rotateX(${rx}deg) rotateY(${ry}deg) scale(${scale})`;
            });
        };

        window.addEventListener('mousemove', update);
        window.addEventListener('touchmove', (e) => update(e.touches[0]));

        // КОНСОЛЬ
        const inputEl = document.getElementById('term-input');
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Backquote') {
                e.preventDefault();
                document.getElementById('term-console').classList.toggle('active');
                inputEl.focus();
            }
        });

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const cmd = inputEl.value.toLowerCase().trim();
                if (cmd === 'red') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--blood-red)');
                    document.getElementById('mode-text').innerText = "NIGHT_PROTOCOL";
                } else if (cmd === 'aqua') {
                    document.documentElement.style.setProperty('--current-accent', 'var(--aqua)');
                    document.getElementById('mode-text').innerText = "AQUA_CORE";
                }
                inputEl.value = '';
            }
        });

        // ПРИНТЕР
        function startTyping() {
            document.querySelectorAll('.type-output').forEach(el => {
                const text = el.getAttribute('data-text');
                let i = 0; el.innerText = '';
                const t = setInterval(() => {
                    el.innerText += text[i++];
                    if (i >= text.length) clearInterval(t);
                }, 25);
            });
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    startTyping();
                }, 1000);
                document.getElementById('main-content').style.opacity = '1';
            }, 3000);
            setInterval(() => { document.getElementById('cpu-val').innerText = Math.floor(Math.random()*15)+5; }, 2000);
        });
    </script>
</body>
</html>
