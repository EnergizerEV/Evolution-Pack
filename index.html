<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--aqua);
            font-family: 'Source Code Pro', monospace;
            transition: opacity 0.5s ease;
        }

        .loading-text { font-size: 14px; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        
        .progress-bar-container {
            width: 200px; height: 2px;
            background: rgba(0, 255, 216, 0.1);
            border: 1px solid rgba(0, 255, 216, 0.3);
            position: relative; overflow: hidden;
        }

        .progress-bar-fill {
            position: absolute; height: 100%; width: 0%;
            background: var(--aqua);
            box-shadow: 0 0 15px var(--aqua);
            transition: width 0.1s linear;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            opacity: 0; /* Изначально скрыт, проявится через JS */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* Окружение */
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 1000; }
        .crt-scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.4; }
        .scanline { width: 100%; height: 100px; z-index: 1010; background: linear-gradient(0deg, rgba(0, 255, 216, 0) 0%, rgba(0, 255, 216, 0.03) 50%, rgba(0, 255, 216, 0) 100%); position: fixed; top: -100px; left: 0; pointer-events: none; animation: scanline-run 10s linear infinite; }
        @keyframes scanline-run { 0% { top: -100px; } 100% { top: 100%; } }

        /* Логотип */
        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 20px; z-index: 10; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 10px var(--aqua)); }
        
        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; z-index: 10; margin: 20px 0; }
        .header h1 span { color: var(--aqua); }

        /* Карточки */
        .card { background: rgba(10, 15, 20, 0.9); border: 1px solid #1a262b; padding: 40px; width: 100%; max-width: 600px; margin-bottom: 30px; transition: 0.4s; position: relative; z-index: 20; }
        .card h2 { margin-top: 0; color: #fff; font-weight: normal; }
        .aqua-style:hover { border-left: 4px solid var(--aqua); box-shadow: 0 0 40px rgba(0, 255, 216, 0.1); }
        .night-style:hover { border-left: 4px solid var(--blood-red); box-shadow: 0 0 40px rgba(255, 0, 0, 0.1); }
