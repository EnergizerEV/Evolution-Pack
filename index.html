<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8; /* Глобальный акцентный цвет */
            --blood-red: #ff0000;
            --bg-color: #06080a;
        }

        /* ОТКЛЮЧАЕМ СТАНДАРТНЫЙ КУРСОР */
        * { cursor: none !important; }

        /* КАСТОМНЫЙ КУРСОР */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 99999; will-change: transform;
            transform: translate(0, 0);
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        /* МЯГКИЙ КЛИК-ЭФФЕКТ */
        body.click-glitch {
            filter: brightness(1.2) contrast(1.1);
            transform: scale(0.998);
        }

        /* ИНТЕРАКТИВНАЯ СЕТКА */
        #grid-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; pointer-events: none;
        }

        /* КРАСИВАЯ КОНСОЛЬ */
        #term-console {
            position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(0, 10, 10, 0.95);
            border: 1px solid var(--aqua); padding: 15px;
            z-index: 10000; font-family: 'Source Code Pro', monospace;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 255, 216, 0.2);
        }
        #term-console.active { top: 20px; }
        #term-input {
            background: transparent; border: none; color: #fff; width: 80%;
            outline: none; font-family: inherit; font-size: 14px; caret-color: var(--aqua);
        }

        /* БАЗОВЫЕ СТИЛИ (ИЗ ИДЕАЛЬНОГО КОДА) */
        body {
            background-color: var(--bg-color); color: #e0e6ed;
            font-family: 'Orbitron', sans-serif; margin: 0;
            display: flex; flex-direction: column; align-items: center;
            padding: 60px 20px; overflow-x: hidden; min-height: 100vh;
            transition: filter 0.1s ease;
        }

        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--aqua); font-family: 'Source Code Pro', monospace; transition: opacity 1s; }
        .progress-bar-container { width: 200px; height: 2px; background: rgba(0, 255, 216, 0.1); border: 1px solid rgba(0, 255, 216, 0.3); position: relative; overflow: hidden; }
        .progress-bar-fill { position: absolute; height: 100%; width: 0%; background: var(--aqua); box-shadow: 0 0 15px var(--aqua); animation: loadProgress 4s forwards; }
        @keyframes loadProgress { to { width: 100%; } }

        #main-content { opacity: 0; transition: opacity 2s ease; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 1000; }
        .crt-scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.4; }

        .parallax-layer { transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); will-change: transform; }

        /* ЛОГОТИП */
        .logo-wrapper { position: relative; width: 150px; height: 150px; margin-bottom: 20px; z-index: 10; }
        .glitch-logo { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 10px var(--aqua)); }
        .logo-glitch { background-image: url('EV_Dark_2k_ERR.png'); opacity: 0; animation: glitch-step 4s infinite step-end; }
        @keyframes glitch-step { 0%, 90%, 100% { opacity: 0; transform: none; } 92% { opacity: 1; transform: translate(6px, -3px); } 94% { opacity: 1; transform: translate(-6px, 3px); } }

        .header h1 { font-size: 2.2rem; letter-spacing: 12px; text-transform: uppercase; z-index: 10; margin: 10px 0; }
        .header h1 span { color: var(--aqua); transition: 0.4s; }

        /* КАРТОЧКИ (ИДЕАЛЬНАЯ ЛОГИКА) */
        .card {
            background: rgba(10, 15, 20, 0.9); border: 1px solid #1a262b; padding: 40px; 
            width: 100%; max-width: 600px; margin-bottom: 30px; position: relative; z-index: 20;
            transition: transform 0.5s cubic-bezier(0.165, 0.84, 0.44, 1), border 0.4s, box-shadow 0.4s, background 0.4s;
        }
        .card h2 { margin-top: 0; color: #fff; transition: 0.4s; font-weight: normal; }
        .glow-part, .night-glow { transition: 0.4s; color: #fff; }

        .aqua-style:hover { 
            border-left: 4px solid var(--aqua); 
            box-shadow: 0 0 40px rgba(0, 255, 216, 0.2); 
            transform: scale(1.03); 
            background: rgba(10, 25, 25, 0.95); 
        }
        .aqua-style:hover .glow-part { color: var(--aqua); text-shadow: 0 0 15px var(--aqua); font-weight: bold; }

        .night-style:hover { 
            border-left: 4px solid var(--blood-red); 
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); 
            transform: scale(1.03); 
            background: rgba(25, 10, 10, 0.95); 
        }
        .night-style:hover .night-glow { color: var(--blood-red); text-shadow: 0 0 15px var(--blood-red); font-weight: bold; }

        p { font-size: 0.85rem; color: #8da0a9; line-height: 1.6; }

        .btn {
            display: inline-block; padding: 12px 25px; text-decoration: none; font-weight: bold; font-size: 0.75rem;
