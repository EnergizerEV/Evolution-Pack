<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal v.6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #06080a;
            --current-accent: var(--aqua);
            --glitch-speed: 0.2s;
        }

        /* БАЗОВЫЕ НАСТРОЙКИ */
        html, body {
            overflow: hidden;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
        }

        * { cursor: none !important; }

        /* ЭФФЕКТ ПЕРЕХОДА (GLITCH) */
        #mode-glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 100001; opacity: 0; pointer-events: none;
            mix-blend-mode: difference;
        }

        /* ПОТЕРТОСТИ И ТУМАН */
        .fog-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-light.png');
            opacity: 0.05; pointer-events: none; z-index: 9998;
        }
        .fog-layer {
            position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0, 255, 216, 0.03) 50%, rgba(0,0,0,0.2) 80%);
            filter: blur(80px); animation: fog-move 25s ease-in-out infinite alternate;
            pointer-events: none; z-index: 9996;
        }
        @keyframes fog-move { from { transform: translate(-15%, -15%); } to { transform: translate(5%, 5%); } }

        /* CRT ЭФФЕКТЫ */
        .scan-line {
            position: fixed; top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 216, 0.06), transparent);
            opacity: 0.15; pointer-events: none; z-index: 1001;
            animation: scanning 4s linear infinite;
        }
        @keyframes scanning { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }

        .crt-scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 999; opacity: 0.4;
        }
        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%);
            pointer-events: none; z-index: 1000;
        }

        /* СЕТКА (CANVAS) */
        #grid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; pointer-events: none; }

        /* КУРСОР И РИППЛ */
        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 32px; height: 32px;
            background-image: url('Cursor1-F1-32x32x32.png');
            background-size: contain; background-repeat: no-repeat;
            pointer-events: none; z-index: 99999; will-change: transform;
        }
        #custom-cursor.pressed { background-image: url('Cursor2-F1-32x32x32.png'); }

        .click-ripple {
            position: fixed; border: 2px solid var(--current-accent);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 9998; animation: ripple-out 0.6s ease-out forwards;
        }
        @keyframes ripple-out { 0% { width: 0; height: 0; opacity: 0.8; } 100% { width: 180px; height: 180px; opacity: 0; } }

        /* КОНСОЛЬ */
        #term-console {
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 650px; background: rgba(5, 7, 10, 0.98);
            border: 1px solid var(--current-accent); padding: 25px;
            z-index: 10000; font-family: 'Source Code Pro', monospace;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,255,216,0.1);
        }
        #term-console.active { top: 40px; }
        #term-input {
            background: transparent; border: none; color: #fff; width: 85%;
            outline: none; font-family: inherit; font-size: 16px; caret-color: var(--current-accent);
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-content {
            opacity: 0; transition: opacity 2.5s ease;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; width: 100%;
        }

        .logo-wrapper { position: relative; width: 160px; height: 160px; margin-bottom: 30px; z-index: 10; }
        .glitch-logo {
            position: absolute; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: background-image 0.5s ease;
        }
        .logo-base { background-image: url('EV_Dark_2k.png'); filter: drop-shadow(0 0 20px var(--current-accent)); }
        .logo-glitch {
            background-image: url('EV_Dark_2k_ERR.png'); opacity: 0;
            animation: logo-jitter 5s infinite step-end;
        }
        @keyframes logo-jitter {
            0%, 93%, 100% { opacity: 0; transform: none; }
            94% { opacity: 1; transform: translate(4px, -2px) skewX(5deg); }
            96% { opacity: 1; transform: translate(-4px, 2px) skewX(-5deg); }
        }

        .header h1 {
            font-size: 2.5rem; letter-spacing: 15px; text-transform: uppercase;
            margin: 15px 0; font-weight: 700; text-align: center;
        }
        .header h1 span { color: var(--current-accent); text-shadow: 0 0 25px var(--current-accent); }

        /* КАРТОЧКИ */
        .card {
            background: rgba(10, 15, 20, 0.94); border: 1px solid rgba(255,255,255,0.05);
            padding: 45px; width: 100%; max-width: 600px; margin-bottom: 35px;
            position: relative; z-index: 20; backdrop-filter: blur(8px);
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .card h2 { margin: 0 0 15px 0; font-size: 1.5rem; font-weight: 400; color: #fff; letter-spacing: 2px; }
        
        .typewriter { font-size: 0.9rem; color: #8da0a9; line-height: 1.7; min-height: 3.4em; font-family: 'Source Code Pro', monospace; }

        .aqua-style:hover {
            border-left: 6px solid var(--aqua);
            box-shadow: 0 0 60px rgba(0, 255, 216, 0.12);
            transform: translateY(-5px) scale(1.02);
            background: rgba(12, 28, 30, 0.96);
        }
        .night-style:hover {
            border-left: 6px solid var(--blood-red);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.15);
            transform: translateY(-5px) scale(1.02);
            background: rgba(30, 12, 12, 0.96);
        }

        /* КНОПКИ */
        .btn {
            display: inline-block; padding: 14px 32px; text-decoration: none;
            font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s;
            margin-top: 20px; color: #666; letter-spacing: 2px;
        }
        .card:hover .btn { border-color: var(--current-accent); color: var(--current-accent); }
        .btn:hover {
            background: #fff !important; color: #000 !important;
            box-shadow: 0 0 30px #fff; animation: flicker 1.5s infinite;
        }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } 70% { opacity: 0.9; } }

        /* ФУТЕР И СТАТУС */
        .footer { margin-top: 30px; font-size: 0.7rem; color: #333; letter-spacing: 3px; z-index: 10; }
        .scramble-text { display: inline-block; color: #444; transition: 0.3s; }
        .scramble-text:hover { color: var(--current-accent); }

        #sys-status {
            position: fixed; bottom: 30px; left: 30px;
            font-family: 'Source Code Pro', monospace; font-size: 11px;
            color: var(--current-accent); opacity: 0.6; line-height: 1.8;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100005; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .load-log { font-family: 'Source Code Pro', monospace; color: var(--aqua); font-size: 12px; margin-bottom: 15px; }
        .progress-wrap { width: 300px; height: 2px; background: rgba(0,255,216,0.1); position: relative; }
        .progress-bar { position: absolute; height: 100%; width: 0; background: var(--aqua); box-shadow: 0 0 20px var(--aqua); animation: grow 3s forwards cubic-bezier(0.1, 0, 0.3, 1); }
        @keyframes grow { to { width: 100%; } }
    </style>
</head>
<body class="aqua-mode">

    <div id="mode-glitch"></div>
    <div class="fog-overlay"></div>
    <div class="fog-layer"></div>
    <div class="scan-line"></div>
    <div class="crt-scanlines"></div>
    <div class="vignette"></div>
    
    <canvas id="grid-canvas"></canvas>
    <div id="custom-cursor"></div>

    <div id="term-console">
        <div style="color:var(--current-accent); font-weight:bold; margin-bottom:10px; font-size:12px;">SYSTEM_TERMINAL_v.6.0</div>
        <span style="color:var(--current-accent)">USER@EVO_OS:~$ </span>
        <input type="text" id="term-input" placeholder="enter command..." autocomplete="off">
    </div>

    <div id="sys-status">
        [ SYSTEM STATUS: ONLINE ]<br>
        [ CORE_TEMP: 42°C ]<br>
        [ MODE: <span id="mode-text">AQUA_CORE</span> ]<br>
        [ CPU_USAGE: <span id="cpu-val">12</span>% ]
    </div>

    <div id="loading-screen">
        <div class="load-log" id="load-text">INITIALIZING_CORE...</div>
        <div class="progress-wrap"><div class="progress-bar"></div></div>
    </div>

    <div id="main-content">
        <div class="logo-wrapper parallax-layer" data-strength="50">
            <div id="logo-main" class="glitch-logo logo-base"></div>
            <div id="logo-err" class="glitch-logo logo-glitch"></div>
        </div>

        <div class="header parallax-layer" data-strength="80">
            <h1><span>EV</span>olution</h1>
        </div>

        <div class="card aqua-style parallax-layer" data-strength="120">
            <h2><span style="color:var(--aqua)">EV</span>olution Pack</h2>
            <div class="typewriter" data-text="Классический набор текстур, оптимизированный под высокую производительность. Включает в себя: Dark-Aqua UI, Redesigned Equipment & Exclusive SFX-Pack."></div>
            <div style="display:flex; gap:15px; margin-top:10px;">
                <a href="https://drive.google.com/file/d/1Qw3G5LnlaEteiOD51bF1Oy1uh2A63R9O/view" target="_blank" class="btn">PC_VER</a>
                <a href="https://drive.google.com/file/d/19GXDO7E-SCvKzvF9ZIklORNZ1xmfN8dC/view" target="_blank" class="btn">MOBILE_VER</a>
            </div>
        </div>

        <div class="card night-style parallax-layer" data-strength="120">
            <h2>Project <span style="color:var(--blood-red)">NIGHT</span></h2>
            <div class="typewriter" data-text="Экспериментальный протокол. Полная переработка визуальной составляющей в сторону глубокой тьмы и контрастных аномалий. Используйте на свой страх и риск."></div>
            <a href="https://drive.google.com/file/d/1nIO79tg17x5P7VQxxa_dwtIzr42Kk9fq/view" target="_blank" class="btn">Access_Data</a>
        </div>

        <div class="footer">
            &copy; 2026 // <div class="scramble-text" id="nickname">M45T0D0NM4N</div> // ENCRYPTED_STATION
        </div>
    </div>

    <script>
        const canvas = document.getElementById('grid-canvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('custom-cursor');
        const glitch = document.getElementById('mode-glitch');
        const input = document.getElementById('term-input');
        
        let m = {x:0, y:0};
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.dispatchEvent(new Event('resize'));

        // СЕТКА
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--current-accent');
            ctx.lineWidth = 0.5;
            const s = 60;
            for(let x=0; x<canvas.width; x+=s){
                for(let y=0; y<canvas.height; y+=s){
                    let d = Math.hypot(x-m.x, y-m.y);
                    ctx.globalAlpha = Math.max(0.05, 0.4 - d/400);
                    ctx.strokeRect(x,y,s,s);
                }
            }
            requestAnimationFrame(draw);
        }
        draw();

        // КУРСОР И ПАРАЛЛАКС
        document.addEventListener('mousemove', e => {
            m.x = e.clientX; m.y = e.clientY;
            cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            
            const cx = window.innerWidth/2, cy = window.innerHeight/2;
            document.querySelectorAll('.parallax-layer').forEach(l => {
                const s = l.dataset.strength;
                l.style.transform = `translate3d(${(e.clientX-cx)/s}px, ${(e.clientY-cy)/s}px, 0)`;
            });
        });

        document.addEventListener('mousedown', () => {
            cursor.classList.add('pressed');
            let r = document.createElement('div'); r.className='click-ripple';
            r.style.left=m.x+'px'; r.style.top=m.y+'px';
            document.body.appendChild(r); setTimeout(()=>r.remove(), 600);
        });
        document.addEventListener('mouseup', () => cursor.classList.remove('pressed'));

        // КОНСОЛЬ
        window.addEventListener('keydown', e => {
            if(e.code==='Backquote') { e.preventDefault(); document.getElementById('term-console').classList.toggle('active'); input.focus(); }
        });

        input.addEventListener('keypress', e => {
            if(e.key==='Enter') {
                const c = input.value.toLowerCase().trim();
                if(c==='red' || c==='aqua') {
                    glitch.style.opacity = '0.6'; setTimeout(()=>glitch.style.opacity='0', 100);
                    if(c==='red') {
                        document.documentElement.style.setProperty('--current-accent','var(--blood-red)');
                        document.body.classList.add('red-mode');
                        document.getElementById('logo-main').style.backgroundImage="url('Project_Night_Icon.png')";
                        document.getElementById('mode-text').innerText="NIGHT_PROTOCOL";
                    } else {
                        document.documentElement.style.setProperty('--current-accent','var(--aqua)');
                        document.body.classList.remove('red-mode');
                        document.getElementById('logo-main').style.backgroundImage="url('EV_Dark_2k.png')";
                        document.getElementById('mode-text').innerText="AQUA_CORE";
                    }
                }
                input.value='';
            }
        });

        // ПРИНТЕР ТЕКСТА
        function startTyping() {
            document.querySelectorAll('.typewriter').forEach(el => {
                const txt = el.dataset.text; let i = 0;
                el.innerHTML = '';
                const interval = setInterval(() => {
                    el.innerHTML += txt.charAt(i); i++;
                    if(i >= txt.length) clearInterval(interval);
                }, 25);
            });
        }

        // ЗАГРУЗКА
        window.addEventListener('load', () => {
            const logs = ["MOUNTING_DRIVES...", "CORE_READY", "SYNCING_INTERFACE...", "ACCESS_GRANTED"];
            let li = 0;
            const logInterval = setInterval(() => {
                document.getElementById('load-text').innerText = logs[li]; li++;
                if(li >= logs.length) clearInterval(logInterval);
            }, 700);

            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity='0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display='none';
                    document.getElementById('main-content').style.opacity='1';
                    startTyping();
                }, 1000);
            }, 3200);
            setInterval(() => { document.getElementById('cpu-val').innerText = Math.floor(Math.random()*20)+10; }, 2000);
        });

        // СКРЕМБЛЕР
        const nick = document.getElementById('nickname');
        const orig = nick.innerText;
        nick.onmouseover = () => {
            let iteration = 0;
            const int = setInterval(() => {
                nick.innerText = orig.split("").map((l, idx) => idx < iteration ? orig[idx] : "01#$X%&"[Math.floor(Math.random()*7)]).join("");
                if(iteration >= orig.length) clearInterval(int);
                iteration += 1/3;
            }, 30);
        };
    </script>
</body>
</html>
