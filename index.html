<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua: #00ffd8;
            --blood-red: #ff0000;
            --bg-color: #040506;
        }

        body {
            background-color: var(--bg-color);
            color: #e0e6ed;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            /* Высокочастотное тусклое мерцание */
            animation: terminal-flicker 0.15s infinite;
        }

        @keyframes terminal-flicker {
            0% { opacity: 0.99; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        /* Эффект шума (Grain) */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 2000;
        }

        /* Общий шейдинг и мягкая виньетка */
        .master-shading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0, 255, 216, 0.02) 0%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 1500;
        }

        /* CRT полоски (более тонкие и частые) */
        .crt-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 1100;
            opacity: 0.4;
        }

        .logo-container {
            width: 130px;
            height: 130px;
            margin-bottom: 20px;
            background-image: url('EV_Dark_2k.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            border: 2px solid var(--aqua);
            box-shadow: 0 0 20px rgba(0, 255, 216, 0.4);
            animation: glitch-soft 6s infinite;
            position: relative;
            z-index: 10;
        }

        @keyframes glitch-soft {
            0%, 92%, 96%, 100% { background-image: url('EV_Dark_2k.png'); transform: none; }
            94% { background-image: url('EV_Dark_2k_ERR.png'); transform: translateX(2px); }
            95% { background-image: url('EV_Dark_2k_ERR.png'); transform: translateX(-2px); }
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 10px 0;
            z-index: 10;
        }
        .header h1 span { color: var(--aqua); text-shadow: 0 0 10px rgba(0, 255, 216, 0.5); }
        .header h1 i { color: #fff; font-style: normal; }

        .card {
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid #1a262b;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            z-index: 10;
        }

        /* EVO Card */
        .aqua-style { border-left: 4px solid #1a262b; }
        .aqua-style h2 { color: #fff; margin-top: 0; transition: 0.4s; }
        .aqua-style h2 .glow-part { color: #fff; transition: 0.4s; }

        .aqua-style:hover { 
            border-left: 4px solid var(--aqua);
            box-shadow: 0 0 30px rgba(0, 255, 216, 0.1), inset 0 0 20px rgba(0, 255, 216, 0.05); 
            transform: scale(1.02); 
        }
        .aqua-style:hover h2 .glow-part { color: var(--aqua); text-shadow: 0 0 10px var(--aqua); }

        /* Night Card */
        .night-style { border-left: 4px solid #1a262b; }
        .night-title { margin-top: 0; transition: 0.4s; color: #fff; }
        .night-title b { color: var(--blood-red); text-shadow: 0 0 5px var(--blood-red); }

        .night-style:hover { 
            border-left: 4px solid var(--blood-red);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.1), inset 0 0 20px rgba(255, 0, 0, 0.05); 
            transform: scale(1.02);
            background: rgba(15, 8, 8, 0.9);
        }
        .night-style:hover .night-title { transform: skewX(-5deg); text-shadow: 0 0 10px var(--blood-red); }

        p { font-size: 0.85rem; color: #8da0a9; letter-spacing: 1px; line-height: 1.6; }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #1a262b;
            transition: 0.3s;
            margin-top: 10px;
            position: relative;
            z-index: 100; /* Чтобы кнопки всегда были сверху шейдинга */
        }
        .btn-aqua { color: #555; }
        .aqua-style:hover .btn-aqua { color: var(--aqua); border-color: var(--aqua); }
        .btn-aqua:hover { background: var(--aqua) !important; color: #000 !important; }

        .btn-night { color: #555; }
        .night-style:hover .btn-night { color: var(--blood-red); border-color: var(--blood-red); }
        .btn-night:hover { background: var(--blood-red) !important; color: #fff !important; }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.65rem;
            color: #222;
            letter-spacing: 2px;
            text-align: center;
            z-index: 10;
        }

        .glitch-wrapper { display: inline-block; color: #333; cursor: help; }
        .glitch-wrapper:hover { animation: panic 0.1s infinite; color: var(--blood-red); }

        @keyframes panic {
            0% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>
    <div class="crt-scanlines"></div>
    <div class="master-shading"></div>
    
    <div class="logo-container"></div>

    <div class="header">
        <h1><span>EV</span><i>olution</i></h1>
    </div>

    <div class="card aqua-style">
        <h2><span class="glow-part">EV</span>o<i>lution</i> <span class="glow-part">Pa</span>ck</h2>
        <p>Глобальная переработка визуальных ассетов. Повышение детализации текстур до стандарта High-Res.</p>
        <a href="https://drive.google.com/file/d/1Qw3G5LnlaEteiOD51bF1Oy1uh2A63R9O/view?usp=drive_link" target="_blank" class="btn btn-aqua">Download Pack</a>
    </div>
